<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Monitor</title>
<style>
  :root {
    /* precision-instrument light palette */
    --bg:#f5f6f8; --panel:#ffffff; --panel-2:#eef0f3; --panel-3:#f7f8fa;
    --border:#e2e5ea; --border-soft:#eceef2;
    --fg:#111318; --muted:#5c6570; --faint:#8b939e;
    --accent:#2563eb; --accent-soft:#eff4ff;
    --shadow:0 1px 0 rgba(17,19,24,.04);
    --shadow-pop:0 8px 24px -12px rgba(17,19,24,.18);
    --ring:0 0 0 3px rgba(37,99,235,.14);
    --radius:8px; --radius-sm:6px;
    --ok:#1a7f37; --fail:#cf222e; --run:#9a6700;
    --c-prompt:#2563eb; --c-response:#1a7f37; --c-thought:#6d5bd0; --c-tool:#9a6700;
    --c-shell:#c0392b; --c-mcp:#1b7c83; --c-file:#a83d7a; --c-subagent:#b45309; --c-lifecycle:#6e7781;
    --mono:"SF Mono","Menlo","Monaco","Consolas","PingFang SC","PingFang TC",monospace;
    --sans:"PingFang SC","PingFang TC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Helvetica,Arial,sans-serif;
    /* type scale — one ramp for the whole panel */
    --fs-label:10px; --fs-xs:11px; --fs-sm:12px; --fs-md:13px; --fs-lg:14px;
    --lh:1.5; --lh-relaxed:1.6; --tracking-label:.04em;
  }
  /* CJK glyphs are visually denser than Latin letters at the same font-size —
     the smallest chrome tier (labels/tags/badges) reads as too small once it
     carries Chinese words. Bump just that tier, and drop the Latin-oriented
     letter-spacing that looks like unwanted gaps between Chinese characters. */
  html[lang="zh-CN"] { --fs-label:11px; --fs-xs:12px; --tracking-label:0; }
  * { box-sizing:border-box; }
  button, input, select, textarea { font-family:var(--sans); font-size:var(--fs-sm); line-height:var(--lh); }
  html,body { height:100%; }
  body {
    margin:0; color:var(--fg); background:var(--bg);
    font-family:var(--sans); font-size:var(--fs-md); line-height:var(--lh);
    display:flex; flex-direction:column; height:100vh; -webkit-font-smoothing:antialiased;
  }
  ::selection { background:rgba(47,111,235,.16); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#d7dbe1; border:3px solid transparent; background-clip:content-box; border-radius:999px; }
  ::-webkit-scrollbar-thumb:hover { background:#c3c9d2; background-clip:content-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  /* ---------------- masthead ---------------- */
  header { position:sticky; top:0; z-index:20; background:var(--panel); border-bottom:1px solid var(--border); }
  .topbar { display:flex; align-items:center; gap:10px; padding:10px 16px; flex-wrap:wrap; }
  .brand { display:flex; align-items:baseline; gap:8px; }
  .brand h1 { font-size:var(--fs-lg); margin:0; font-weight:650; display:inline-flex; align-items:center; gap:8px; color:var(--fg); }
  .brand h1::before { content:""; width:7px; height:7px; border-radius:1.5px; background:var(--accent); }
  .brand .sub { color:var(--faint); font-size:var(--fs-xs); font-weight:450; }
  .spacer { flex:1; }
  .pill { display:inline-flex; align-items:center; gap:6px; background:var(--panel-3); border:1px solid var(--border);
          border-radius:var(--radius-sm); padding:3px 9px; color:var(--muted); font-size:var(--fs-xs); font-variant-numeric:tabular-nums;
          font-family:var(--sans); font-weight:500; }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .dot.on { background:var(--ok); }
  .dot.off { background:var(--faint); }
  .seg { display:inline-flex; border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; background:var(--panel); }
  .seg button { background:transparent; color:var(--muted); border:0; padding:5px 11px; cursor:pointer; font-size:var(--fs-sm); font-weight:550;
    transition:color .12s, background .12s; }
  .seg button:hover { color:var(--fg); background:var(--panel-3); }
  .seg button.active { background:var(--accent); color:#fff; font-weight:600; }
  .seg button:active:not(.active) { background:var(--panel-2); }
  .toggle { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); border-radius:var(--radius-sm);
            padding:4px 9px; cursor:pointer; background:var(--panel); color:var(--muted); font-size:var(--fs-sm); font-weight:550; user-select:none;
            transition:border-color .12s, color .12s, background .12s; }
  .toggle:hover { color:var(--fg); }
  .toggle .sw { width:24px; height:14px; border-radius:999px; background:#d0d5dc; position:relative; transition:background .15s; flex-shrink:0; }
  .toggle .sw::after { content:""; position:absolute; top:2px; left:2px; width:10px; height:10px; border-radius:50%; background:#fff;
                       box-shadow:0 1px 2px rgba(0,0,0,.18); transition:transform .15s; }
  .toggle.on { color:var(--fg); border-color:color-mix(in srgb, var(--accent) 40%, var(--border)); background:var(--accent-soft); }
  .toggle.on .sw { background:var(--accent); }
  .toggle.on .sw::after { transform:translateX(10px); }

  /* ---------------- filter bar ---------------- */
  .filterbar { display:flex; align-items:center; gap:8px; padding:8px 16px; flex-wrap:wrap; border-top:1px solid var(--border-soft); background:var(--panel); }
  .filterbar .grp { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .flabel { color:var(--faint); font-size:var(--fs-label); text-transform:capitalize; margin-right:2px; font-weight:600; }
  input[type=text], select {
    background:var(--panel); color:var(--fg); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:5px 9px; font-size:var(--fs-sm); outline:none; transition:border-color .12s, box-shadow .12s;
  }
  select { color:var(--muted); }
  input[type=text] { width:200px; }
  input[type=text]::placeholder { color:var(--faint); }
  input[type=text]:focus, select:focus { border-color:var(--accent); box-shadow:var(--ring); }
  .chip-link { background:none; border:0; color:var(--accent); font-size:var(--fs-xs); cursor:pointer; padding:4px 8px; border-radius:var(--radius-sm); transition:background .12s; font-weight:550; }
  .chip-link:hover { background:var(--panel-2); }

  /* filter dropdowns (source / type) */
  .dropdown { position:relative; }
  .dd-btn { display:inline-flex; align-items:center; gap:7px; background:var(--panel); border:1px solid var(--border); border-radius:var(--radius-sm);
    padding:5px 9px; font-size:var(--fs-sm); color:var(--fg); cursor:pointer; transition:border-color .12s, box-shadow .12s; }
  .dd-btn:hover { border-color:#d0d5dc; }
  .dd-btn .flabel { margin:0; }
  .dd-val { color:var(--muted); font-variant-numeric:tabular-nums; font-family:var(--sans); font-size:var(--fs-xs); }
  .dd-caret { color:var(--faint); font-size:9px; transition:transform .15s; }
  .dropdown.open .dd-btn { border-color:var(--accent); box-shadow:var(--ring); }
  .dropdown.open .dd-caret { transform:rotate(180deg); }
  .dd-menu { position:absolute; top:calc(100% + 5px); left:0; z-index:40; min-width:200px; background:var(--panel);
    border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow-pop); padding:5px; display:none; max-height:344px; overflow:auto; }
  .dropdown.open .dd-menu { display:block; }
  .dd-item { display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:var(--radius-sm); cursor:pointer; font-size:var(--fs-sm); color:var(--fg); user-select:none; }
  .dd-item:hover { background:var(--panel-2); }
  .dd-check { width:14px; height:14px; border:1px solid var(--border); border-radius:3px; flex-shrink:0; display:grid; place-items:center;
    font-size:9px; line-height:1; color:transparent; background:var(--panel); }
  .dd-item.on .dd-check { background:var(--accent); border-color:var(--accent); color:#fff; }
  .dd-item .cdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .dd-item .dd-name { flex:1; text-transform:capitalize; }
  .dd-sep { height:1px; background:var(--border-soft); margin:5px 2px; }
  .dd-actions { display:flex; gap:4px; padding:1px 2px; }
  .dd-empty { color:var(--faint); font-size:var(--fs-sm); padding:6px 8px; }

  /* ---------------- main / lists ---------------- */
  main { flex:1; display:flex; min-height:0; }
  #list { flex:1; overflow:auto; padding:12px 14px; }
  #detail { width:40%; max-width:600px; min-width:320px; border-left:1px solid var(--border); background:var(--panel); overflow:auto; }
  .detail-head { position:sticky; top:0; background:color-mix(in srgb, var(--panel) 92%, transparent); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border-soft); padding:11px 16px; z-index:2; }
  .detail-head h2 { font-size:var(--fs-label); text-transform:uppercase; color:var(--faint); letter-spacing:var(--tracking-label); margin:0; font-weight:650; }
  .detail-body { padding:14px 16px; }
  .hint { margin-bottom:12px; border:1px solid var(--border-soft); border-radius:var(--radius-sm); background:var(--panel); overflow:hidden; }
  .hint > summary { cursor:pointer; list-style:none; padding:8px 11px; font-size:var(--fs-sm); color:var(--muted); font-weight:550; user-select:none; }
  .hint > summary::-webkit-details-marker { display:none; }
  .hint > summary::before { content:"▸ "; color:var(--faint); font-size:var(--fs-label); }
  .hint[open] > summary::before { content:"▾ "; }
  .hint > summary:hover { background:var(--panel-3); color:var(--fg); }
  .hint-body { padding:0 11px 10px; color:var(--muted); font-size:var(--fs-sm); line-height:var(--lh); border-top:1px solid var(--border-soft); padding-top:8px; }
  .hint-body b { color:var(--fg); font-weight:600; }
  .empty { color:var(--faint); padding:48px 20px; text-align:center; }
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    padding:56px 24px; gap:8px; min-height:180px; }
  .empty-title { font-size:var(--fs-lg); font-weight:650; color:var(--fg); margin:0; }
  .empty-body { font-size:var(--fs-sm); color:var(--muted); max-width:340px; line-height:var(--lh); margin:0; }
  .empty-action { margin-top:8px; border:1px solid var(--border); background:var(--panel); color:var(--fg); border-radius:var(--radius-sm);
    padding:6px 12px; font-size:var(--fs-sm); font-weight:600; cursor:pointer; transition:background .12s, border-color .12s; }
  .empty-action:hover { background:var(--panel-2); border-color:#d0d5dc; }

  details.session { border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px;
    background:var(--panel); overflow:hidden; transition:border-color .12s ease; box-shadow:var(--shadow); }
  details.session:hover { border-color:#d0d5dc; }
  details.session > summary { padding:10px 12px; cursor:pointer; list-style:none; display:flex; align-items:center; gap:9px; font-weight:600; }
  details.session > summary::-webkit-details-marker { display:none; }
  details.session > summary:hover { background:var(--panel-3); }
  .sess-id { font-family:var(--sans); font-weight:600; font-size:var(--fs-sm); color:var(--fg); }
  .sess-model { color:var(--muted); font-weight:400; font-size:var(--fs-xs); font-family:var(--sans); }
  .src-badge { font-size:var(--fs-label); font-weight:650; padding:2px 7px; border-radius:4px; color:#fff;
    text-transform:lowercase; flex-shrink:0; }
  .turn { margin:0 8px 4px; padding:4px 0 2px; }
  .turn + .turn { border-top:1px solid var(--border-soft); }
  .turn-body { padding:4px 5px 5px; }
  .steps { margin:3px 4px; border:1px dashed var(--border); border-radius:var(--radius-sm); background:var(--panel-3); overflow:hidden; }
  .steps > summary { padding:6px 9px 6px 26px; cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; position:relative; }
  .steps > summary::-webkit-details-marker { display:none; }
  .steps > summary::before { content:"▸"; position:absolute; left:11px; color:var(--faint); font-size:9px; }
  .steps[open] > summary::before { content:"▾"; }
  .steps > summary:hover { background:var(--panel-2); }
  .steps-count { font-size:var(--fs-sm); font-weight:600; color:var(--fg); }
  .steps-cats { font-size:var(--fs-xs); color:var(--faint); text-transform:lowercase; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .steps-body { padding:2px 4px 4px; }

  /* ---------------- per-turn flow diagram (opt-in, collapsed) ---------------- */
  .flow { margin:3px 4px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--panel); overflow:hidden; }
  .flow > summary { padding:6px 9px 6px 26px; cursor:pointer; list-style:none; display:flex; align-items:center; gap:8px; position:relative; }
  .flow > summary::-webkit-details-marker { display:none; }
  .flow > summary::before { content:"▸"; position:absolute; left:11px; color:var(--faint); font-size:9px; }
  .flow[open] > summary::before { content:"▾"; }
  .flow > summary:hover { background:var(--panel-2); }
  .flow-title { font-size:var(--fs-sm); font-weight:600; color:var(--fg); }
  .flow-sub { font-size:var(--fs-xs); color:var(--faint); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .flow-tokens { margin-left:auto; position:relative; flex-shrink:0; max-width:55%; }
  .flow-tokens.pending .flow-tok-total { color:var(--faint); font-weight:500; }
  .flow-tok-chip {
    display:flex; align-items:center; gap:7px; padding:2px 6px; margin:-2px -4px;
    border-radius:5px; cursor:pointer; font-variant-numeric:tabular-nums;
    border:1px solid transparent;
  }
  .flow-tok-chip:hover { background:var(--panel-2); border-color:var(--border); }
  .flow-tokens.open .flow-tok-chip { background:var(--accent-soft); border-color:color-mix(in srgb, var(--accent) 28%, white); }
  .flow-tok-minibar { width:40px; height:6px; border-radius:3px; display:flex; overflow:hidden; background:var(--panel-2); flex-shrink:0; }
  .flow-tok-minibar span { display:block; height:100%; min-width:0; }
  .flow-tok-total { font-size:var(--fs-sm); font-weight:650; color:var(--fg); white-space:nowrap; }
  .tok-pop {
    display:none; position:absolute; right:0; top:calc(100% + 6px); z-index:40;
    width:272px; padding:12px 12px 10px; background:var(--panel);
    border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-pop);
  }
  .flow-tokens.open .tok-pop { display:block; }
  .tok-pop-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .tok-pop-title { font-size:var(--fs-md); font-weight:600; color:var(--fg); }
  .tok-pop-close { border:0; background:transparent; color:var(--faint); cursor:pointer; font-size:14px; line-height:1; padding:2px 4px; border-radius:4px; }
  .tok-pop-close:hover { background:var(--panel-2); color:var(--fg); }
  .tok-pop-sum { display:flex; align-items:baseline; justify-content:space-between; gap:8px; margin-bottom:8px; font-variant-numeric:tabular-nums; }
  .tok-pop-pct { font-size:var(--fs-sm); font-weight:600; color:var(--fg); }
  .tok-pop-total { font-size:var(--fs-xs); color:var(--faint); }
  .tok-pop-bar { display:flex; height:8px; border-radius:4px; overflow:hidden; background:var(--panel-2); margin-bottom:10px; }
  .tok-pop-bar span { display:block; height:100%; min-width:0; }
  .tok-pop-list { display:flex; flex-direction:column; gap:6px; }
  .tok-pop-row { display:flex; align-items:center; gap:8px; font-size:var(--fs-sm); }
  .tok-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .tok-pop-label { color:var(--fg); flex:1; min-width:0; }
  .tok-pop-val { color:var(--muted); font-variant-numeric:tabular-nums; flex-shrink:0; }
  .tok-inline {
    margin-top:10px; padding:12px; background:var(--panel-3);
    border:1px solid var(--border); border-radius:10px;
  }
  .flow-wrap { padding:6px 8px 10px; overflow-x:auto; }
  .flow-note { color:var(--faint); font-size:var(--fs-label); margin-top:6px; line-height:1.4; }
  .flow-svg { display:block; }
  .flow-svg .flow-actor { fill:var(--fg); font-size:11px; font-weight:600; }
  .flow-svg .flow-lbl { font-size:10px; }
  .flow-msg .flow-hit { fill:transparent; }
  .flow-msg:hover .flow-hit { fill:rgba(37,99,235,.05); }
  .flow-msg.flow-sel .flow-hit { fill:var(--accent-soft); }
  .node.start { border-left:2px solid var(--c-prompt); }
  .node.end { border-left:2px solid var(--c-response); }
  .node.start.sel, .node.end.sel { border-left-color:var(--accent); }
  .node { display:flex; align-items:center; gap:9px; padding:6px 8px; margin:1px 3px; border-radius:var(--radius-sm); cursor:pointer;
          border:1px solid transparent; position:relative; transition:background .1s ease, border-color .1s ease; }
  .node:hover { background:var(--panel-2); }
  .node.sel { background:var(--accent-soft); border-color:color-mix(in srgb, var(--accent) 28%, white); }
  .node.sel::before { content:""; position:absolute; left:-1px; top:5px; bottom:5px; width:2px; border-radius:2px; background:var(--accent); }
  .node.active .st.run { animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(154,103,0,.35);} 50%{ box-shadow:0 0 0 3px rgba(154,103,0,0);} }
  .tag { font-size:var(--fs-label); padding:1px 6px; border-radius:4px; font-weight:650; flex-shrink:0; text-transform:lowercase;
         border:1px solid transparent; }
  .label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg); font-weight:450; font-size:var(--fs-md); }
  .meta { color:var(--faint); font-size:var(--fs-xs); line-height:1; font-family:var(--sans); flex-shrink:0; font-variant-numeric:tabular-nums; }
  .st { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .st.ok{ background:var(--ok);} .st.fail{ background:var(--fail);} .st.run{ background:var(--run);}
  .tl { position:relative; padding-left:18px; }
  .tl::before { content:""; position:absolute; left:5px; top:4px; bottom:4px; width:1px; background:var(--border); }
  .tlrow { position:relative; display:flex; align-items:center; gap:9px; padding:5px 8px; border-radius:var(--radius-sm); cursor:pointer; transition:background .1s ease; }
  .tlrow:hover { background:var(--panel-2); }
  .tlrow.sel { background:var(--accent-soft); }
  .tlrow::before { content:""; position:absolute; left:-16px; width:6px; height:6px; border-radius:50%; background:var(--panel); border:1.5px solid var(--border); }
  .tlrow.sel::before { border-color:var(--accent); background:var(--accent); }
  .time { color:var(--faint); font-size:var(--fs-xs); line-height:1; font-family:var(--sans); font-variant-numeric:tabular-nums; flex-shrink:0; }

  /* ---------------- detail inspector ---------------- */
  .d-section { margin-bottom:14px; }
  .d-title { font-size:var(--fs-label); text-transform:uppercase; letter-spacing:var(--tracking-label); color:var(--faint); margin:0 0 7px; display:flex; align-items:center; gap:7px; font-weight:650; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:4px 12px; font-size:var(--fs-sm); }
  .kv .k { color:var(--muted); font-family:var(--sans); font-size:var(--fs-xs); white-space:nowrap; }
  .kv .v { color:var(--fg); word-break:break-word; }
  .prose { background:var(--panel-3); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:11px 12px; white-space:pre-wrap;
           word-break:break-word; font-size:var(--fs-md); line-height:var(--lh-relaxed); }
  .prose.thought { border-left:2px solid var(--c-thought); background:color-mix(in srgb, var(--c-thought) 6%, white); color:#4b3b7a; }
  .prose.prompt { border-left:2px solid var(--c-prompt); }
  .prose.response { border-left:2px solid var(--c-response); }
  .term { background:#0d1117; color:#d1d9e0; border-radius:var(--radius-sm); padding:11px 12px; font-family:var(--mono); font-size:var(--fs-sm); line-height:var(--lh);
          white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:340px; }
  .term .cmd { color:#79c0ff; display:block; margin-bottom:6px; }
  .term .cmd::before { content:"$ "; color:#7ee787; }
  .code { background:var(--panel-3); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:10px 12px; font-family:var(--mono);
          font-size:var(--fs-sm); line-height:var(--lh); white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:340px; color:var(--fg); }
  .diff { border:1px solid var(--border-soft); border-radius:var(--radius-sm); overflow:auto; max-height:360px; font-family:var(--mono); font-size:var(--fs-sm); line-height:var(--lh); }
  .diff .dl { padding:1px 12px; white-space:pre-wrap; word-break:break-word; }
  .diff .add { background:rgba(26,127,55,.12); color:#0f5323; }
  .diff .del { background:rgba(207,34,46,.11); color:#82161f; }
  .diff .hunk { background:rgba(37,99,235,.10); color:#1d4ed8; }
  .diff .ctx { color:var(--muted); }
  .chipline { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .badge { font-size:var(--fs-xs); padding:2px 8px; border-radius:var(--radius-sm); border:1px solid transparent; font-weight:600; }
  .st-ok { background:rgba(26,127,55,.11); color:var(--ok); }
  .st-fail { background:rgba(207,34,46,.11); color:var(--fail); }

function catOf(ev){
  // Claude Code has no dedicated response event — its final reply rides on the
  // Stop event as last_assistant_message. Surface it as a response.
  if(ev.last_assistant_message!=null && ev.last_assistant_message!=="") return "response";
  const raw = String(ev._event||"").toLowerCase();
  let cat = EVENT_ALIASES[raw] || "unknown";
  if(cat==="tool"){
    const tn = String(ev.tool_name||"").toLowerCase();
    if(/bash|shell|terminal|(^|_)exec/.test(tn)) return "shell";
    if(/read|write|edit|apply_patch|multiedit|createfile|str_replace/.test(tn)) return "file";
    if(/^mcp[:_]|mcp__/.test(tn)) return "mcp";
  }
  return cat;
}

function summarize(ev){
  const c = catOf(ev);
  if(c==="prompt") return clip(ev.prompt,120) || "(prompt)";
  if(c==="response") return clip(ev.text||ev.message||ev.last_assistant_message,120) || "(response)";
  if(c==="thought") return clip(ev.text||ev.thinking,120) || "(thinking)";
  if(c==="shell") return clip(toolCmd(ev),120) || "(shell)";
  if(c==="file") return clip(toolPath(ev),120) || "(file)";
  if(c==="mcp") return clip(ev.tool_name||ev.url||ev.server,120) || "(mcp)";
  if(c==="subagent") return clip((ev.subagent_type?ev.subagent_type+": ":"")+(ev.task||ev.description||ev.summary||""),120) || "(subagent)";
  if(c==="tool") return clip((ev.tool_name?ev.tool_name:"tool")+(ev.tool_input?" "+clip(JSON.stringify(ev.tool_input),80):""),120);
  return ev._event + (ev.reason?" · "+ev.reason:"") + (ev.status?" · "+ev.status:"");
}
function keyOf(ev){ return ev.tool_use_id || ev.subagent_id || (ev._event+"|"+ev._ts+"|"+(ev.generation_id||"")); }
// Cursor tags every event in a turn with the same generation_id, EXCEPT
// afterAgentThought: each thought chunk gets its own "<base>-<index>-<rand>"
// suffix on top of the turn's base id. Strip that suffix so all thoughts
// group back into the turn they actually belong to.
function turnGenId(ev){
  const raw = ev.generation_id || ev.prompt_id || "";
  const m = /^([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})-\d+-[0-9a-z]+$/i.exec(raw);
  return m ? m[1] : raw;
}

// beforeShellExecution/afterShellExecution and beforeMCPExecution/afterMCPExecution
// never carry a tool_use_id (unlike the preToolUse/postToolUse pair captured for
// the very same call), so keyOf() can't group them with their call and each fires
// as its own singleton node — one shell/MCP call could show up as 3 separate rows
// (preToolUse+postToolUse, plus a lone "before…" and a lone "after…"). Fold each
// sidecar event into whichever same-turn, same-category node started closest to it
// in time, so a single call stays a single node everywhere it's rendered.
const EXEC_SIDECAR_EVENTS = new Set(["beforeshellexecution","aftershellexecution","beforemcpexecution","aftermcpexecution"]);
function mergeExecutionSidecars(S){
  const sidecarKeys=[], hosts=[];
  for(const [k,n] of S.nodes){
    const isSidecar = n.evs.every(e=> EXEC_SIDECAR_EVENTS.has(String(e._event||"").toLowerCase()));
    if(isSidecar) sidecarKeys.push(k);
    else if(n.cat==="shell"||n.cat==="mcp") hosts.push(n);
  }
  for(const k of sidecarKeys){
    const sc = S.nodes.get(k);
    const scTs = +new Date(sc.firstTs);
    let best=null, bestDist=Infinity;
    for(const h of hosts){
      if(h.cat!==sc.cat || h.gen!==sc.gen) continue;
      const d = Math.abs(+new Date(h.firstTs)-scTs);
      if(d<bestDist){ bestDist=d; best=h; }
    }
    if(best && bestDist<10000){ best.evs.push(...sc.evs); S.nodes.delete(k); }
  }
}

function build(){
  const filtered = events.filter(ev=>{
    if(ev._event==="_ping") return false;
    if(sessionFilter && sessionKeyOf(ev)!==sessionFilter) return false;
    if(srcFilter.size && !srcFilter.has(srcOf(ev))) return false;
    if(projFilter.size && !projFilter.has(projectOf(ev))) return false;
    if(!catFilter.has(catOf(ev))) return false;
    if(search){ const hay=(ev._event+" "+srcOf(ev)+" "+summarize(ev)).toLowerCase(); if(!hay.includes(search.toLowerCase())) return false; }
    return true;
  });
  const sessions = new Map();
  for(const ev of filtered){
    const cid = sessionKeyOf(ev);
    if(!sessions.has(cid)) sessions.set(cid,{ cid, src:srcOf(ev), model:ev.model||ev.model_id||"", proj:projectOf(ev), nodes:new Map(), firstTs:ev._ts, lastTs:ev._ts });
    const S = sessions.get(cid);
    if(new Date(ev._ts) > new Date(S.lastTs)) S.lastTs = ev._ts;   // track most-recent activity for ordering
    if(ev.model||ev.model_id) S.model = ev.model||ev.model_id;
    if(!S.proj){ const p=projectOf(ev); if(p) S.proj=p; }
    const k = keyOf(ev);
    // Turn id: Cursor tags each turn with generation_id; Claude Code has none but
    // shares one prompt_id across a turn's prompt → tools → stop. Fall back to it
    // so Claude turns group into a turnBlock and get a sequence diagram too.
    if(!S.nodes.has(k)) S.nodes.set(k,{ key:cid+"::"+k, cat:catOf(ev), gen:turnGenId(ev), evs:[], firstTs:ev._ts });
    S.nodes.get(k).evs.push(ev);
  }
  for(const S of sessions.values()) mergeExecutionSidecars(S);
  return sessions;
}

function nodeState(node){
  const evs = node.evs;
  if(evs.some(e=>e._event==="postToolUseFailure"||/failure$/i.test(e._event))) return "fail";
  const st = evs.find(e=>e.status)?.status;
  if(st==="error"||st==="aborted"||st==="failed") return "fail";
  const done = evs.some(e=>/^(post|after)|Stop$|^stop$|End$/i.test(e._event)) || st==="completed";
  return done? "ok":"run";
}
function nodeDuration(node){
  const d = node.evs.map(e=>e.duration||e.duration_ms).find(x=>typeof x==="number");
  if(typeof d==="number") return d>=1000? (d/1000).toFixed(1)+"s" : d+"ms";
  if(node.evs.length>1){ const t=node.evs.map(e=>+new Date(e._ts)).filter(x=>x); if(t.length>1){ const ms=Math.max(...t)-Math.min(...t); return ms>=1000?(ms/1000).toFixed(1)+"s":ms+"ms"; } }
  return "";
}
function nodeLabel(node){ const base=node.evs.find(e=>summarize(e))||node.evs[0]; return summarize(base); }

function tag(cat, text){
  const t=document.createElement("span"); t.className="tag"; t.textContent=text||cat;
  const col=cvar(CATVAR[cat]||"--c-lifecycle");
  t.style.color=col;
  t.style.background="color-mix(in srgb, "+col+" 11%, white)";
  t.style.borderColor="color-mix(in srgb, "+col+" 26%, white)";
  return t;
}
function srcBadge(src){ const b=document.createElement("span"); b.className="src-badge"; b.textContent=src; b.style.background=sourceColor(src); return b; }

function render(){
  $("count").textContent = fmtEventCount(events.filter(e=>e._event!=="_ping").length);
  const list = $("list");
  const atBottom = follow;
  const prevTop = list.scrollTop;
  const frag = document.createDocumentFragment();
  frag.appendChild(hintBlock());

  if(view==="history"){
    const n = renderHistory(frag);
    if(!n){
      frag.appendChild(filtersActive()
        ? emptyState(t("empty.noMatchesTitle"), t("empty.noMatchesBodyHistory"), { label:t("empty.clearFilters"), onClick:clearFilters })
        : emptyState(t("empty.noSessionsTitle"), t("empty.noSessionsBody")));
    }
    list.innerHTML=""; list.appendChild(frag); animateEntrance(list);
    list.scrollTop = prevTop;   // history is a browse view; don't auto-jump
    return;
  }

  const sessions = build();
  if(sessions.size===0){
    frag.appendChild(filtersActive()
      ? emptyState(t("empty.noMatchesTitle"), t("empty.noMatchesBody"), { label:t("empty.clearFilters"), onClick:clearFilters })
      : emptyState(t("empty.waitingTitle"), t("empty.waitingBody")));
    list.innerHTML=""; list.appendChild(frag); return;
  }
  if(view==="timeline"){
    // One row per node, not per raw hook event — a single shell command fires
    // preToolUse/beforeShellExecution/afterShellExecution/postToolUse, and listing
    // each stage as its own near-identical row buried the signal in noise. build()
    // already groups those via keyOf() (tool_use_id-based) for the tree view; reuse
    // the same nodes here so one row = one call, with its full call+result on click.
    const rows=[]; for(const S of sessions.values()) for(const n of S.nodes.values()) rows.push(n);
    rows.sort((a,b)=> new Date(a.firstTs)-new Date(b.firstTs));
    const wrap=document.createElement("div"); wrap.className="tl";
    let lastSrc=null;
    for(const n of rows){ const s=srcOf(n.evs[0]); wrap.appendChild(tlRow(n, s!==lastSrc)); lastSrc=s; }
    frag.appendChild(wrap);
  } else {
    // newest conversation on top: order sessions by most-recent activity
    const ordered=[...sessions.values()].sort((a,b)=> new Date(b.lastTs)-new Date(a.lastTs));
    for(const S of ordered) frag.appendChild(treeSession(S));
  }
  list.innerHTML=""; list.appendChild(frag);
  animateEntrance(list);
  // tree shows newest on top → "follow" pins to the top; timeline still pins to the bottom
  if(atBottom) list.scrollTop = (view==="tree") ? 0 : list.scrollHeight;
  else list.scrollTop = prevTop;
}

function tlRow(node, showSrc){
  const row=document.createElement("div"); row.className="tlrow";
  const k=node.key; if(selectedKey===k) row.classList.add("sel");
  row.setAttribute("data-anim-key", k);
  const time=document.createElement("span"); time.className="time"; time.textContent=timeOf(node.firstTs);
  const lab=document.createElement("span"); lab.className="label"; lab.textContent=nodeLabel(node);
  const meta=document.createElement("span"); meta.className="meta"; meta.textContent=nodeDuration(node);
  row.append(time);
  if(showSrc) row.append(srcBadge(srcOf(node.evs[0])));   // only when the source changes — one badge per run, not per row
  row.append(tag(node.cat),lab,meta);
  row.onclick=()=>{ selectedKey=k; showDetail(node.evs, node.cat); render(); };
  return row;
}

function treeSession(S){
  const d=document.createElement("details"); d.className="session"; d.open=true;
  const sm=document.createElement("summary");
  sm.appendChild(srcBadge(S.src));
  // Project is the primary way to find "which conversation is this" in a tool
  // that watches every project at once — lead with it, not the session hash.
  const proj=document.createElement("span"); proj.className="sess-id";
  proj.textContent=S.proj?basename(S.proj):t("proj.unknown");
  if(S.proj) proj.title=S.proj;
  const model=document.createElement("span"); model.className="sess-model"; model.textContent=S.model?("· "+S.model):"";
  const id=document.createElement("span"); id.className="sess-model"; id.textContent="· "+String(S.cid).slice(0,8);
  const sp=document.createElement("span"); sp.style.flex="1";
  const cnt=document.createElement("span"); cnt.className="meta"; cnt.textContent=fmtNodeCount(S.nodes.size);
  sm.append(proj,model,id,sp,cnt); d.appendChild(sm);

  const turns=new Map();
  for(const n of S.nodes.values()){ const g=n.gen||"—"; if(!turns.has(g)) turns.set(g,[]); turns.get(g).push(n); }
  for(const [g,nodes] of turns){
    nodes.sort((a,b)=> new Date(a.firstTs)-new Date(b.firstTs));
    if(g==="—"){ const body=document.createElement("div"); body.className="turn-body"; for(const n of nodes) body.appendChild(nodeEl(n)); d.appendChild(body); continue; }
    d.appendChild(turnBlock(nodes, S.cid+"::"+g));
  }
  return d;
}

// A turn reads as a conversation: the user prompt is the entry point, the final
// response is the end, and everything the agent did in between collapses away.
function turnBlock(nodes, key){
  const wrap=document.createElement("div"); wrap.className="turn";
  const prompt=nodes.find(n=>n.cat==="prompt");
  let response=null; for(const n of nodes){ if(n.cat==="response") response=n; }
  const middle=nodes.filter(n=> n!==prompt && n!==response);
  if(prompt){ const el=nodeEl(prompt); el.classList.add("start"); wrap.appendChild(el); }
  if(middle.length){
    const st=document.createElement("details"); st.className="steps";
    st.open = stepsOpen.has(key);
    st.addEventListener("toggle", ()=>{ if(st.open) stepsOpen.add(key); else stepsOpen.delete(key); });
    const sm=document.createElement("summary");
    const cats=[...new Set(middle.map(n=>n.cat))];
    const cnt=elp("steps-count", fmtStepCount(middle.length));
    const cs=elp("steps-cats", cats.join(" · "));
    sm.append(cnt, cs); st.appendChild(sm);
    const b=document.createElement("div"); b.className="steps-body";
    for(const n of middle) b.appendChild(nodeEl(n));
    st.appendChild(b); wrap.appendChild(st);
  }
  if(response){ const el=nodeEl(response); el.classList.add("end"); wrap.appendChild(el); }
  const flow=flowBlock(nodes, key); if(flow) wrap.appendChild(flow);
  return wrap;
}

function nodeEl(node){
  const el=document.createElement("div"); el.className="node"; if(selectedKey===node.key) el.classList.add("sel");
  el.setAttribute("data-anim-key", node.key);
  const state=nodeState(node); if(state==="run") el.classList.add("active");
  const st=document.createElement("span"); st.className="st "+state;
  const lab=document.createElement("span"); lab.className="label"; lab.textContent=nodeLabel(node);
  const meta=document.createElement("span"); meta.className="meta"; meta.textContent=nodeDuration(node);
  el.append(st,tag(node.cat),lab,meta);
  el.onclick=()=>{ selectedKey=node.key; showDetail(node.evs, node.cat); render(); };
  return el;
}

/* ---------------- per-turn sequence diagram ----------------
   A sequence-diagram view of one turn's information chain, drawn as raw SVG
   (no dependency). The lanes are a fixed cast (drawn every turn); the messages
   come only from captured hook events. It stays honest about the platform
   limit: model-internal token steps aren't observable — user prompt in,
   tool/thought/mcp steps, assistant reply out. */
const SVGNS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs){ const e=document.createElementNS(SVGNS,tag); if(attrs) for(const k in attrs){ if(attrs[k]!=null&&attrs[k]!=="") e.setAttribute(k, attrs[k]); } return e; }
const FLOW_LANE_CATS = ["tool","shell","file","mcp","subagent"];
function laneLabel(cat){ return t("lane."+cat); }

// Cheap: decide lanes + ordered messages without touching the DOM, so we can
// skip empty turns and defer the expensive SVG build until the user expands.
function turnFlowModel(nodes){
  const lanes=[]; const laneIndex={};
  const addLane=(id,label)=>{ laneIndex[id]=lanes.length; lanes.push({id,label}); };
  // Always draw the full cast — even lanes this turn didn't touch — so the
  // structure stays fixed and turns are visually comparable at a glance.
  addLane("user",laneLabel("user"));
  addLane("agent",laneLabel("agent"));
  for(const cat of FLOW_LANE_CATS) addLane(cat,laneLabel(cat));
  const messages=[];
  for(const n of nodes){
    const c=n.cat;
    if(c==="prompt") messages.push({from:"user",to:"agent",cat:"prompt",label:nodeLabel(n),node:n});
    else if(c==="response") messages.push({from:"agent",to:"user",cat:"response",dashed:true,label:nodeLabel(n),node:n});
    else if(c==="thought") messages.push({from:"agent",to:"agent",self:true,cat:"thought",label:nodeLabel(n),node:n});
    else if(laneIndex[c]!=null){
      messages.push({from:"agent",to:c,cat:c,label:nodeLabel(n),node:n});
      const st=nodeState(n);
      if(st!=="run"){ const dur=nodeDuration(n); messages.push({from:c,to:"agent",cat:c,dashed:true,label:(st==="fail"?t("flow.fail"):t("flow.result"))+(dur?(" · "+dur):""),node:n}); }
    }
    // lifecycle / unknown middle events are noise here — skip them
  }
  return { lanes, laneIndex, messages };
}

function flowArrowHead(g, x, y, dir, col){ const s=4.5; g.appendChild(svgEl("path",{ d:"M "+x+" "+y+" L "+(x-dir*s)+" "+(y-s)+" L "+(x-dir*s)+" "+(y+s)+" Z", fill:col })); }

function flowSvg(model){
  const { lanes, laneIndex, messages } = model;
  const laneW=128, headH=28, topPad=16, rowH=38, botPad=16;
  const W = lanes.length*laneW;
  const bodyTop = headH+topPad;
  const H = bodyTop + messages.length*rowH + botPad + headH;
  const laneX = i => Math.round(i*laneW + laneW/2);
  const border = cvar("--border"), panelBg = cvar("--panel-3");
  const svg = svgEl("svg",{ class:"flow-svg", width:W, height:H, viewBox:"0 0 "+W+" "+H });

  lanes.forEach((ln,i)=>{
    const x=laneX(i);
    svg.appendChild(svgEl("line",{ x1:x, y1:headH, x2:x, y2:H-headH, stroke:border, "stroke-width":1 }));
    [0, H-headH].forEach(top=>{
      const bw=Math.min(laneW-16,108), bh=headH-6;
      svg.appendChild(svgEl("rect",{ x:x-bw/2, y:top+3, width:bw, height:bh, rx:5, fill:panelBg, stroke:border }));
      const t=svgEl("text",{ x:x, y:top+headH/2+1, "text-anchor":"middle", "dominant-baseline":"middle", class:"flow-actor" });
      t.textContent=clip(ln.label,12); svg.appendChild(t);
    });
  });

  messages.forEach((m,r)=>{
    const y=Math.round(bodyTop + r*rowH + rowH/2);
    const col=cvar(CATVAR[m.cat]||"--c-lifecycle");
    const g=svgEl("g",{ class:"flow-msg"+(m.node&&selectedKey===m.node.key?" flow-sel":"") });
    g.appendChild(svgEl("rect",{ class:"flow-hit", x:0, y:y-rowH/2, width:W, height:rowH }));
    if(m.self){
      const x=laneX(laneIndex[m.from]); const w=30, up=y-8, dn=y+8;
      g.appendChild(svgEl("path",{ d:"M "+x+" "+up+" h "+w+" v "+(dn-up)+" h "+(-(w-4)), fill:"none", stroke:col, "stroke-width":1.4 }));
      flowArrowHead(g, x+4, dn, -1, col);
      const t=svgEl("text",{ x:x+w+8, y:up-3, class:"flow-lbl", fill:col });
      t.textContent=clip(m.label, Math.max(10, Math.floor((W-(x+w+12))/6.2))); g.appendChild(t);
    } else {
      const sx=laneX(laneIndex[m.from]), tx=laneX(laneIndex[m.to]); const dir=tx>sx?1:-1;
      g.appendChild(svgEl("line",{ x1:sx, y1:y, x2:tx-dir*6, y2:y, stroke:col, "stroke-width":1.4, "stroke-dasharray": m.dashed?"4 3":null }));
      flowArrowHead(g, tx-dir*1, y, dir, col);
      const t=svgEl("text",{ x:(sx+tx)/2, y:y-5, "text-anchor":"middle", class:"flow-lbl", fill:col });
      t.textContent=clip(m.label, Math.max(6, Math.floor((Math.abs(tx-sx)-12)/6.2))); g.appendChild(t);
    }
    const ttl=svgEl("title"); ttl.textContent=m.label; g.appendChild(ttl);
    if(m.node){ g.style.cursor="pointer"; g.addEventListener("click",(e)=>{ e.stopPropagation(); selectedKey=m.node.key; showDetail(m.node.evs, m.node.cat); render(); }); }
    svg.appendChild(g);
  });
  return svg;
}

// A collapsed <details> holding the flow diagram; the SVG is built lazily on
// first open so collapsed turns cost nothing on each re-render.
function flowBlock(nodes, key){
  const model = turnFlowModel(nodes);
  if(!model.messages.length) return null;
  const fkey = key+"::flow";
  const fl=document.createElement("details"); fl.className="flow"; fl.open=flowOpen.has(fkey);
  const sm=document.createElement("summary");
  sm.append(elp("flow-title",t("flow.title")), elp("flow-sub",t("flow.legend")));
  const tok=flowTokensEl(nodes); if(tok) sm.appendChild(tok);
  fl.appendChild(sm);
  const wrap=elp("flow-wrap"); fl.appendChild(wrap);
  const build=()=>{ if(wrap.dataset.built) return; wrap.dataset.built="1";
    wrap.appendChild(flowSvg(model));
    wrap.appendChild(elp("flow-note",t("flow.note"))); };
  if(fl.open) build();
  fl.addEventListener("toggle", ()=>{ if(fl.open){ flowOpen.add(fkey); build(); } else flowOpen.delete(fkey); });
  return fl;
}

/* ---------------- per-turn token usage ----------------
   Cursor exposes input/output/cache_* on afterAgentResponse/stop.
   Claude Code does not — usage lives on assistant rows in transcript_path.
   UI mirrors Cursor's Context Usage card: total + segmented bar + category list.
   Categories are API usage slices (hooks don't expose System/Rules/Skills splits). */
const txCache = new Map(); // path -> {text, promise}
const USAGE_CATS = [
  { key:"input", color:"#8b939e" },
  { key:"cacheWrite", color:"#7c6af0" },
  { key:"cacheRead", color:"#c2410c" },
  { key:"output", color:"#2563eb" },
];
function usageLabel(key){ return t("usage."+key); }
function fmtTok(n){
  n=Number(n)||0;
  if(n>=1e6) return (n/1e6).toFixed(n>=1e7?0:1).replace(/\.0$/,"")+"M";
  if(n>=1000) return (n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,"")+"k";
  return String(Math.round(n));
}
function emptyUsage(){ return { input:0, output:0, cacheRead:0, cacheWrite:0 }; }
function usageTotal(u){ return u.input+u.output+u.cacheRead+u.cacheWrite; }
function usageParts(u){
  return USAGE_CATS.map(c=>({ ...c, label:usageLabel(c.key), value:Number(u[c.key])||0 })).filter(p=>p.value>0);
}
function usageBar(parts, total, cls){
  const bar=elp(cls||"tok-pop-bar");
  if(!total){ return bar; }
  parts.forEach(p=>{
    const seg=document.createElement("span");
    seg.style.background=p.color;
    seg.style.flex=String(p.value);
    seg.title=p.label+" · "+p.value.toLocaleString();
    bar.appendChild(seg);
  });
  return bar;
}
function usageFromEvs(evs){
  let best=null, bestScore=-1;
  for(const ev of evs){
    const has = ev.input_tokens!=null || ev.output_tokens!=null ||
      ev.cache_read_tokens!=null || ev.cache_write_tokens!=null ||
      ev.cache_read_input_tokens!=null || ev.cache_creation_input_tokens!=null;
    if(!has) continue;
    const u={
      input:Number(ev.input_tokens)||0,
      output:Number(ev.output_tokens)||0,
      cacheRead:Number(ev.cache_read_tokens??ev.cache_read_input_tokens)||0,
      cacheWrite:Number(ev.cache_write_tokens??ev.cache_creation_input_tokens)||0,
    };
    const score=usageTotal(u);
    if(score>bestScore){ best=u; bestScore=score; }
  }
  return best && bestScore>0 ? best : null;
}
function isToolResultUser(msg){
  const c=msg&&msg.content;
  return Array.isArray(c)&&c.length>0&&c.every(x=>x&&typeof x==="object"&&x.type==="tool_result");
}
function isRealUserPrompt(entry, msg){
  if(!msg||msg.role!=="user") return false;
  if(entry&&entry.isMeta) return false;
  if(isToolResultUser(msg)) return false;
  return true;
}
function usageFromTranscriptText(text, fromTs, toTs, promptId){
  const byId=new Map();
  let turn=null, matched=null, lastTurn=null;
  for(const line of String(text).split("\n")){
    if(!line) continue;
    let o; try{ o=JSON.parse(line); }catch{ continue; }
    if(o.isSidechain) continue;
    const msg=o.message;
    if(o.type==="user"&&isRealUserPrompt(o, msg)){
      turn=new Map(); lastTurn=turn;
      if(promptId&&o.promptId===promptId) matched=turn;
      continue;
    }
    if(o.type!=="assistant"||!msg||!msg.usage) continue;
    if(promptId){
      if(matched===turn&&turn) turn.set(msg.id||o.uuid||("n"+turn.size), msg.usage);
      continue;
    }
    const ts=o.timestamp||"";
    const inRange=(!fromTs||!ts||ts>=fromTs)&&(!toTs||!ts||ts<=toTs);
    if(fromTs||toTs){
      if(!inRange) continue;
      byId.set(msg.id||o.uuid||("n"+byId.size), msg.usage);
    } else if(turn){
      turn.set(msg.id||o.uuid||("n"+turn.size), msg.usage);
    }
  }
  const src=promptId ? (matched||lastTurn) : ((fromTs||toTs) ? byId : lastTurn);
  if(!src||!src.size) return null;
  const u=emptyUsage();
  for(const usage of src.values()){
    u.input+=Number(usage.input_tokens)||0;
    u.output+=Number(usage.output_tokens)||0;
    u.cacheRead+=Number(usage.cache_read_input_tokens||usage.cache_read_tokens)||0;
    u.cacheWrite+=Number(usage.cache_creation_input_tokens||usage.cache_write_tokens)||0;
  }
  return usageTotal(u)>0 ? u : null;
}
function turnPromptId(nodes){
  for(const n of nodes) for(const ev of n.evs){ if(ev.prompt_id) return ev.prompt_id; }
  return "";
}
function turnTimeRange(nodes){
  let from="", to="";
  for(const n of nodes) for(const ev of n.evs){
    const ts=ev._ts; if(!ts) continue;
    if(!from||ts<from) from=ts;
    if(!to||ts>to) to=ts;
  }
  return { from, to };
}
function turnTranscriptPath(nodes){
  for(const n of nodes) for(const ev of n.evs){
    if(ev.transcript_path) return ev.transcript_path;
    if(ev.agent_transcript_path) return ev.agent_transcript_path;
  }
  return "";
}
function closeAllTokenPops(except){

function usageCardBody(parent, u, title){

  sum.appendChild(elp("tok-pop-pct", top ? Math.round(top.value/total*100)+"% "+top.label : t("token.consumed")));
  sum.appendChild(elp("tok-pop-total", "~"+fmtTok(total)+" Tokens"));
  parent.appendChild(sum);
  parent.appendChild(usageBar(parts, total, "tok-pop-bar"));
  const list=elp("tok-pop-list");
  USAGE_CATS.forEach(c=>{

function fillTokensEl(el, u){
  el.classList.remove("pending");
  el.innerHTML="";
  if(!u){ el.hidden=true; return; }
  el.hidden=false;
  const total=usageTotal(u);
  const parts=usageParts(u);

  const chip=elp("flow-tok-chip");
  chip.appendChild(usageBar(parts, total, "flow-tok-minibar"));
  chip.appendChild(elp("flow-tok-total", fmtTok(total)));
  chip.title=t("token.chipTooltip");

  const pop=elp("tok-pop");
  const headEl=usageCardBody(pop, u, t("token.title"));
  const x=document.createElement("button"); x.type="button"; x.className="tok-pop-close"; x.textContent="×"; x.setAttribute("aria-label",t("token.close"));
  if(headEl) headEl.appendChild(x);

  const toggle=(e)=>{ e.preventDefault(); e.stopPropagation();
    const willOpen=!el.classList.contains("open");
    closeAllTokenPops(el);
    el.classList.toggle("open", willOpen);
  };
  chip.addEventListener("click", toggle);
  x.addEventListener("click", (e)=>{ e.preventDefault(); e.stopPropagation(); el.classList.remove("open"); });

function loadTranscript(path){
  let ent=txCache.get(path);
  if(ent&&ent.text!=null) return Promise.resolve(ent.text);
  if(ent&&ent.promise) return ent.promise;
  const promise=fetch("/api/transcript-raw?path="+encodeURIComponent(path))
    .then(r=>{ if(!r.ok) throw new Error(r.statusText); return r.text(); })
    .then(text=>{ txCache.set(path,{text}); return text; })
    .catch(err=>{ txCache.delete(path); throw err; });
  txCache.set(path,{promise});
  return promise;
}
function flowTokensEl(nodes){
  const evs=nodes.flatMap(n=>n.evs);
  const el=elp("flow-tokens");
  const direct=usageFromEvs(evs);
  if(direct){ fillTokensEl(el, direct); return el; }
  const path=turnTranscriptPath(nodes);
  if(!path) return null;
  const {from,to}=turnTimeRange(nodes);
  const promptId=turnPromptId(nodes);
  const cached=txCache.get(path);
  if(cached&&cached.text!=null){
    fillTokensEl(el, usageFromTranscriptText(cached.text, from, to, promptId));
    return el;
  }
  el.classList.add("pending");
  const chip=elp("flow-tok-chip"); chip.appendChild(elp("flow-tok-total","…")); el.appendChild(chip);
  loadTranscript(path).then(text=>{
    fillTokensEl(el, usageFromTranscriptText(text, from, to, promptId));
  }).catch(()=>{ el.hidden=true; });
  return el;
}

function kvBlock(pairs){
  const g=elp("kv");
  for(const [k,v] of pairs){ if(v==null||v==="") continue; g.appendChild(elp("k",k)); const vv=elp("v"); vv.textContent=(typeof v==="object")?prettyText(v):String(v); g.appendChild(vv); }

// Readable, escape-free rendering of captured values. JSON.stringify shows
// nested strings with \" and \n which is painful to read in the panel, so we
// print a YAML-ish view where string values keep their real newlines/quotes.
function prettyLines(val, indent){
  const pad="  ".repeat(indent);
  if(val===null||val===undefined) return [pad+"null"];
  const t=typeof val;
  if(t==="number"||t==="boolean") return [pad+String(val)];
  if(t==="string") return val.split("\n").map(p=>pad+p);
  if(Array.isArray(val)){
    if(!val.length) return [pad+"[]"];
    const lines=[];
    val.forEach(item=>{
      if(item&&typeof item==="object"){ lines.push(pad+"-"); prettyLines(item,indent+1).forEach(l=>lines.push(l)); }
      else { const sub=prettyLines(item,indent+1); lines.push(pad+"- "+sub[0].trimStart()); for(let i=1;i<sub.length;i++) lines.push(sub[i]); }
    });
    return lines;
  }
  const keys=Object.keys(val);
  if(!keys.length) return [pad+"{}"];
  const lines=[];
  keys.forEach(k=>{
    const v=val[k], t2=typeof v;
    if(v===null||v===undefined||t2==="number"||t2==="boolean"){ lines.push(pad+k+": "+String(v===undefined?null:v)); }
    else if(t2==="string"){
      if(v.indexOf("\n")>=0){ lines.push(pad+k+":"); v.split("\n").forEach(p=>lines.push("  ".repeat(indent+1)+p)); }
      else lines.push(pad+k+": "+v);
    } else {
      const sub=prettyLines(v,indent+1);
      if(sub.length===1&&(sub[0].trim()==="[]"||sub[0].trim()==="{}")) lines.push(pad+k+": "+sub[0].trim());
      else { lines.push(pad+k+":"); sub.forEach(l=>lines.push(l)); }
    }
  });
  return lines;
}
function prettyText(val){ if(typeof val!=="object"||val===null) return String(val); return prettyLines(val,0).join("\n"); }
function codeBlock(val, cls){ const c=elp(cls||"code"); c.textContent=prettyText(val); return c; }
function diffBlock(text){
  const wrap=elp("diff");
  for(const line of String(text).split("\n")){
    const dl=elp("dl"); dl.textContent=line;
    const c=line[0];
    if(line.startsWith("@@")) dl.classList.add("hunk");
    else if(c==="+"&&!line.startsWith("+++")) dl.classList.add("add");
    else if(c==="-"&&!line.startsWith("---")) dl.classList.add("del");
    else dl.classList.add("ctx");
    wrap.appendChild(dl);
  }
  return wrap;
}
function statusBadge(st){ if(!st) return null; const b=elp("badge",st); b.classList.add(st==="completed"||st==="ok"?"st-ok":(st==="error"||st==="failed"||st==="aborted"?"st-fail":"st-run")); return b; }

function renderRich(evs, cat, opts){
  const out=document.createDocumentFragment();
  const src=srcOf(evs[0]||{});
  if(!(opts&&opts.noHead)){ const head=elp("chipline"); head.appendChild(srcBadge(src)); out.appendChild(head); }

  if(cat==="prompt"||cat==="response"||cat==="thought"){
    const txt=pick(evs,["prompt","text","message","thinking","last_assistant_message"]);
    const s=section(cat==="prompt"?"User prompt":cat==="response"?"Agent response":"Agent thinking", cat);
    if(txt!=null){ s.appendChild(elp("prose "+cat, String(txt))); } else { s.appendChild(elp("empty","(no text)")); }
    if(cat==="response"){
      const u=usageFromEvs(evs);
      if(u){
        const card=elp("tok-inline");
        usageCardBody(card, u, t("token.title"));
        s.appendChild(card);
      }
    }
    out.appendChild(s);
  }
  else if(cat==="shell"){
    const cmd=pick(evs,["command"])||(evs.map(toolCmd).find(x=>x)); const cwd=pick(evs,["cwd"]);
    const output=pick(evs,["output","stdout","result","result_json","tool_output"]);
    const s=section("Shell command", cat);
    const meta=firstWith(evs,["command","tool_input"])||evs[0];
    s.appendChild(kvBlock([["cwd",cwd],["exit",meta&&meta.exit_code],["status",pick(evs,["status"])],["duration",fmtDur(evs)]]));
    out.appendChild(s);
    const term=elp("term");
    if(cmd!=null){ const c=elp("cmd"); c.textContent=String(cmd); term.appendChild(c); }
    if(output!=null) term.appendChild(document.createTextNode(typeof output==="object"?prettyText(output):String(output)));
    else term.appendChild(document.createTextNode("(no output captured)"));
    const os=section("Terminal output", null); os.appendChild(term); out.appendChild(os);
  }
  else if(cat==="file"){
    const fp=evs.map(toolPath).find(x=>x); const content=pick(evs,["content"]);
    const diff=pick(evs,["diff","patch","unified_diff"]);
    let edits=pick(evs,["edits","changes"]); if(!edits){ const ti=pick(evs,["tool_input"]); if(ti&&Array.isArray(ti.edits)) edits=ti.edits; }
    const s=section(evs.some(e=>/fileedit|write|apply_patch/i.test(e._event)||/write|edit|apply_patch/i.test(e.tool_name||""))?"File edit":"File read", cat);
    s.appendChild(kvBlock([["path",fp]])); out.appendChild(s);
    if(diff!=null){ const ds=section("Diff", null); ds.appendChild(diffBlock(diff)); out.appendChild(ds); }
    else if(Array.isArray(edits)){
      const ds=section("Edits", null);
      edits.forEach((ed,i)=>{ ds.appendChild(elp("ev-sep","edit #"+(i+1)));
        if(ed.old_string||ed.oldText) ds.appendChild(diffBlock(String(ed.old_string||ed.oldText).split("\n").map(l=>"-"+l).join("\n")));
        if(ed.new_string||ed.newText) ds.appendChild(diffBlock(String(ed.new_string||ed.newText).split("\n").map(l=>"+"+l).join("\n"))); });
      out.appendChild(ds);
    }
    else if(content!=null){ const cs=section("Content", null); cs.appendChild(codeBlock(content)); out.appendChild(cs); }
  }
  else if(cat==="tool"){
    const name=pick(evs,["tool_name"]); const input=pick(evs,["tool_input","input","args"]);
    const output=pick(evs,["tool_output","output","result","result_json"]); const failed=evs.some(e=>/failure$/i.test(e._event)||e._event==="postToolUseFailure");
    const err=pick(evs,["error","error_message","message"]);
    const s=section("Tool · "+(name||"tool"), cat);
    const chipline=elp("chipline"); const sb=statusBadge(failed?"failed":pick(evs,["status"])); if(sb) chipline.appendChild(sb);
    const dur=fmtDur(evs); if(dur){ const db=elp("badge",dur); db.classList.add("st-run"); chipline.appendChild(db); }
    if(chipline.childNodes.length) s.appendChild(chipline);
    out.appendChild(s);
    if(input!=null){ const is=section("Input", null); is.appendChild(codeBlock(input)); out.appendChild(is); }
    if(output!=null){ const os=section("Result", null); os.appendChild(codeBlock(output)); out.appendChild(os); }
    if(failed&&err!=null){ const es=section("Error", null); es.appendChild(codeBlock(err)); out.appendChild(es); }
  }
  else if(cat==="mcp"){
    const name=pick(evs,["tool_name"]); const url=pick(evs,["url","server","server_name"]);
    const input=pick(evs,["tool_input","input","params","arguments"]); const output=pick(evs,["result","result_json","output","response"]);
    const s=section("MCP · "+(name||url||"call"), cat);
    s.appendChild(kvBlock([["server",url],["tool",name],["status",pick(evs,["status"])],["duration",fmtDur(evs)]]));
    out.appendChild(s);
    if(input!=null){ const is=section("Input", null); is.appendChild(codeBlock(input)); out.appendChild(is); }
    if(output!=null){ const os=section("Result", null); os.appendChild(codeBlock(output)); out.appendChild(os); }
  }
  else if(cat==="subagent"){
    const type=pick(evs,["subagent_type"]); const model=pick(evs,["model","model_id","subagent_model"]);
    const task=pick(evs,["task","description","summary"]); const status=pick(evs,["status"]);
    const s=section("Subagent · "+(type||""), cat);
    const chipline=elp("chipline"); const sb=statusBadge(status); if(sb) chipline.appendChild(sb);
    if(chipline.childNodes.length) s.appendChild(chipline);
    s.appendChild(kvBlock([
      ["model",model],["task",task],
      ["tool calls",pick(evs,["tool_call_count"])],["messages",pick(evs,["message_count"])],
      ["duration",fmtDur(evs)],["summary",pick(evs,["summary"])]
    ]));
    out.appendChild(s);
    const tpath=pick(evs,["agent_transcript_path"]); const conv=pick(evs,["conversation_id","parent_conversation_id"]); const sid=pick(evs,["subagent_id","tool_call_id"]);
    if(tpath&&conv&&sid){
      const ls=section("Archived transcript", null);
      const file=conv+"/"+String(sid).replace(/[^a-zA-Z0-9._-]/g,"_")+".jsonl";
      const a=document.createElement("a"); a.className="d-link"; a.target="_blank"; a.href="/api/transcript?file="+encodeURIComponent(file);
      a.textContent="open subagent transcript ↗"; ls.appendChild(a);
      const note=elp("meta"," (available only after it was archived)"); ls.appendChild(note);
      out.appendChild(ls);
    }
  }
  else {
    const s=section(esc(evs[0]&&evs[0]._event)||"event", cat);
    s.appendChild(kvBlock([
      ["conversation",pick(evs,["conversation_id"])],["session",pick(evs,["session_id"])],
      ["model",pick(evs,["model","model_id"])],["mode",pick(evs,["composer_mode"])],
      ["status",pick(evs,["status"])],["reason",pick(evs,["reason"])],["loop",pick(evs,["loop_count"])],
      ["context %",pick(evs,["context_usage_percent"])],["tokens",pick(evs,["context_tokens"])],
    ]));
    out.appendChild(s);
  }
  return out;
}
function fmtDur(evs){ const d=evs.map(e=>e.duration||e.duration_ms).find(x=>typeof x==="number"); if(typeof d!=="number") return ""; return d>=1000?(d/1000).toFixed(1)+"s":d+"ms"; }

/* ---------------- history view ---------------- */
function groupNodes(evs){
  const m=new Map();
  for(const ev of evs){ const k=keyOf(ev); if(!m.has(k)) m.set(k,{cat:catOf(ev),evs:[],firstTs:ev._ts}); m.get(k).evs.push(ev); }
  return [...m.values()].sort((a,b)=> new Date(a.firstTs)-new Date(b.firstTs));
}
function fmtWhen(ts){ try{ const d=new Date(ts); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("en-GB",{hour12:false,hour:"2-digit",minute:"2-digit"}); }catch{ return ""; } }
function durBetween(a,b){ const ms=Math.max(0,new Date(b)-new Date(a)); if(ms>=3600000) return (ms/3600000).toFixed(1)+"h"; if(ms>=1000) return Math.round(ms/1000)+"s"; return ms+"ms"; }

function historySessions(){
  const map=new Map();
  for(const ev of events){
    if(ev._event==="_ping") continue;
    if(srcFilter.size && !srcFilter.has(srcOf(ev))) continue;
    if(projFilter.size && !projFilter.has(projectOf(ev))) continue;
    const key=sessionKeyOf(ev);
    let S=map.get(key);
    if(!S){ S={ key, src:srcOf(ev), model:"", proj:projectOf(ev), title:"", start:ev._ts, end:ev._ts, prompts:0, tools:0, lastReply:"", lastReplyTs:0, status:"", evs:[] }; map.set(key,S); }
    S.evs.push(ev);
    if(ev.model||ev.model_id) S.model=ev.model||ev.model_id;
    if(!S.proj){ const p=projectOf(ev); if(p) S.proj=p; }
    if(ev._ts<S.start) S.start=ev._ts;
    if(ev._ts>S.end) S.end=ev._ts;
    const c=catOf(ev);
    if(c==="prompt"){ S.prompts++; if(!S.title) S.title=clip(ev.prompt,90); }
    if(c==="tool"||c==="shell"||c==="file"||c==="mcp") S.tools++;
    if(c==="response"){ const t=+new Date(ev._ts); if(t>=S.lastReplyTs){ S.lastReplyTs=t; S.lastReply=clip(replyText(ev),150); } }
    if(ev.status) S.status=ev.status;
  }
  let arr=[...map.values()];
  if(search){
    const q=search.toLowerCase();
    arr=arr.filter(S=> (S.key+" "+S.src+" "+S.model+" "+S.title+" "+S.lastReply).toLowerCase().includes(q)
      || S.evs.some(e=>{ const c=catOf(e); if(c==="prompt") return String(e.prompt||"").toLowerCase().includes(q);
        if(c==="response") return String(replyText(e)||"").toLowerCase().includes(q); return false; }));
  }
  return arr;
}

function mkBtn(text, onclick, cls){
  const b=document.createElement("button"); b.className="hbtn"+(cls?" "+cls:""); b.textContent=text;
  b.onclick=(e)=>{ e.stopPropagation(); onclick(); }; return b;
}

function renderHistory(frag){
  const arr=historySessions();
  const pinned=[], normal=[], hiddenArr=[];
  for(const S of arr){ if(hidden.has(S.key)) hiddenArr.push(S); else if(pins.has(S.key)) pinned.push(S); else normal.push(S); }
  const byRecent=(a,b)=> new Date(b.end)-new Date(a.end);
  pinned.sort(byRecent); normal.sort(byRecent); hiddenArr.sort(byRecent);

  const bar=elp("hist-bar");
  bar.appendChild(elp("hist-count",fmtSessionCount(pinned.length+normal.length, hiddenArr.length)));
  const sp=document.createElement("span"); sp.style.flex="1"; bar.appendChild(sp);
  bar.appendChild(mkBtn(t("hist.clearAll"), clearAll, "danger"));
  frag.appendChild(bar);

  for(const S of pinned) frag.appendChild(histCard(S));
  for(const S of normal) frag.appendChild(histCard(S));
  if(hiddenArr.length){
    const det=document.createElement("details"); det.className="hist-hidden";

    for(const S of hiddenArr) det.appendChild(histCard(S));

  }
  return arr.length;

function histCard(S){
  const c=elp("hist-card"); c.setAttribute("data-anim-key","hist::"+S.key);
  if(replayKey===S.key) c.classList.add("sel");
  if(pins.has(S.key)) c.classList.add("pinned");

  const head=elp("hist-head");
  head.appendChild(srcBadge(S.src));
  // Project first and bold — same rationale as treeSession(): with many
  // projects feeding one global panel, the project name is what a user
  // scans for, not the meaningless session hash.
  const projTag=elp("hist-id", S.proj?basename(S.proj):t("proj.unknown"));
  if(S.proj) projTag.title=S.proj;
  head.appendChild(projTag);
  if(S.model) head.appendChild(elp("hist-model","· "+S.model));
  head.appendChild(elp("hist-model","· "+String(S.key).slice(0,8)));
  const sp=document.createElement("span"); sp.style.flex="1"; head.appendChild(sp);
  if(pins.has(S.key)) head.appendChild(elp("hist-pin","★"));
  head.appendChild(elp("hist-when", fmtWhen(S.end)));
  c.appendChild(head);

  c.appendChild(elp("hist-title", S.title || t("hist.noPrompt")));
  c.appendChild(elp("hist-meta", fmtHistMeta(S.prompts, S.tools, durBetween(S.start,S.end))));
  if(S.lastReply) c.appendChild(elp("hist-reply","↩ "+S.lastReply));

  const acts=elp("hist-acts");
  acts.append(
    mkBtn(t("hist.replay"), ()=>{ replayKey=S.key; showReplay(S); render(); }),
    mkBtn(t("hist.json"), ()=>exportSession(S,"json")),
    mkBtn(t("hist.markdown"), ()=>exportSession(S,"md")),
    mkBtn(pins.has(S.key)?t("hist.unpin"):t("hist.pin"), ()=>togglePin(S.key)),
    mkBtn(hidden.has(S.key)?t("hist.unhide"):t("hist.hide"), ()=>toggleHidden(S.key)),
    mkBtn(t("hist.delete"), ()=>deleteSession(S.key), "danger")
  );
  c.appendChild(acts);
  c.onclick=()=>{ replayKey=S.key; showReplay(S); render(); };
  return c;
}

function showReplay(S){
  const body=$("detailBody"); body.className=""; body.innerHTML="";
  const head=elp("chipline"); head.appendChild(srcBadge(S.src));
  head.appendChild(elp("meta"," "+String(S.key).slice(0,8)+(S.model?(" · "+S.model):"")));
  body.appendChild(head);
  const evs=S.evs.slice().sort((a,b)=> new Date(a._ts)-new Date(b._ts));
  for(const n of groupNodes(evs)){
    if(n.cat==="lifecycle") continue;   // replay is the conversation, not lifecycle noise
    const blk=elp("replay-turn"); blk.appendChild(renderRich(n.evs, n.cat, {noHead:true})); body.appendChild(blk);
  }
  if(!body.querySelector(".replay-turn")) body.appendChild(elp("empty","(no conversation content captured)"));
  animateDetail();
}

function download(name, text, type){
  const blob=new Blob([text],{type:type||"text/plain"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportSession(S, fmt){
  const evs=S.evs.slice().sort((a,b)=> new Date(a._ts)-new Date(b._ts));
  const base=S.src+"-"+String(S.key).slice(0,8);
  if(fmt==="json"){ download(base+".json", JSON.stringify(evs,null,2), "application/json"); return; }
  let md="# "+S.src+" · session "+String(S.key).slice(0,8)+"\n\n";
  md+="- model: "+(S.model||"?")+"\n- start: "+S.start+"\n- end: "+S.end+"\n- turns: "+S.prompts+" · tools: "+S.tools+"\n\n---\n\n";
  for(const n of groupNodes(evs)){
    const e0=n.evs[0];
    if(n.cat==="prompt") md+="## 🧑 User\n\n"+(pick(n.evs,["prompt"])||"")+"\n\n";
    else if(n.cat==="response") md+="## 🤖 Assistant\n\n"+(pick(n.evs,["text","message","last_assistant_message"])||"")+"\n\n";
    else if(n.cat==="thought") md+="> 💭 "+clip(pick(n.evs,["text","thinking"]),600)+"\n\n";
    else if(n.cat==="shell") md+="`$ "+clip(toolCmd(e0),200)+"`\n\n";
    else if(n.cat==="file") md+="**📄 "+clip(toolPath(e0)||"file",200)+"**\n\n";
    else if(n.cat==="tool"||n.cat==="mcp") md+="**🔧 "+clip(pick(n.evs,["tool_name"])||n.cat,120)+"**\n\n";
  }
  download(base+".md", md, "text/markdown");
}

function togglePin(key){ if(pins.has(key)) pins.delete(key); else pins.add(key); saveSet("am:pins",pins); render(); }
function toggleHidden(key){ if(hidden.has(key)){ hidden.delete(key); } else { hidden.add(key); if(replayKey===key) replayKey=null; } saveSet("am:hidden",hidden); render(); }

async function reloadAll(){
  events=[]; seen=new Set(); animatedKeys.clear(); firstRender=true;
  knownSources.clear(); renderSrcChips();
  knownProjects.clear(); renderProjChips();
  const sel=$("session"); sel.innerHTML='<option value="">'+t("session.all")+'</option>'; sessionFilter="";
  try{ const r=await fetch("/api/events"); const arr=await r.json(); arr.forEach(addEvent); }catch(e){}
  render();
}
async function deleteSession(key){
  if(!confirm(t("confirm.deleteSession")+"\n\n"+key+"\n\n"+t("confirm.deleteSessionWarn"))) return;
  try{ const r=await fetch("/api/session/delete?key="+encodeURIComponent(key),{method:"POST"}); if(!r.ok) throw new Error(await r.text()); }
  catch(e){ alert(t("alert.deleteFailed")+e.message); return; }
  if(replayKey===key) replayKey=null;
  pins.delete(key); saveSet("am:pins",pins); hidden.delete(key); saveSet("am:hidden",hidden);
  await reloadAll();
}
async function clearAll(){
  if(!confirm(t("confirm.clearAll1")+"\n\n"+t("confirm.clearAll1Body"))) return;
  if(!confirm(t("confirm.clearAll2"))) return;
  try{ const r=await fetch("/api/history/clear",{method:"POST"}); if(!r.ok) throw new Error(await r.text()); }
  catch(e){ alert(t("alert.clearFailed")+e.message); return; }
  replayKey=null; pins.clear(); hidden.clear(); saveSet("am:pins",pins); saveSet("am:hidden",hidden);
  await reloadAll();
}

/* ---------------- chips / controls ---------------- */
function ddItem(name, color, on, onToggle){
  const it=elp("dd-item"+(on?" on":""));
  const chk=elp("dd-check"); chk.textContent="✓"; it.appendChild(chk);
  const dot=elp("cdot"); dot.style.background=color; it.appendChild(dot);
  it.appendChild(elp("dd-name", name));
  it.onclick=(e)=>{ e.stopPropagation(); onToggle(); };
  return it;
}
function renderChips(){
  const menu=$("typeMenu"); if(!menu) return; menu.innerHTML="";
  for(const c of CATS){
    menu.appendChild(ddItem(c, cvar(CATVAR[c]), catFilter.has(c), ()=>{
      if(catFilter.has(c)) catFilter.delete(c); else catFilter.add(c); renderChips(); render();
    }));
  }
  menu.appendChild(elp("dd-sep"));
  const acts=elp("dd-actions");
  const bAll=document.createElement("button"); bAll.className="chip-link"; bAll.textContent=t("dd.selectAll");
  bAll.onclick=(e)=>{ e.stopPropagation(); CATS.forEach(c=>catFilter.add(c)); renderChips(); render(); };
  const bNone=document.createElement("button"); bNone.className="chip-link"; bNone.textContent=t("dd.clear");
  bNone.onclick=(e)=>{ e.stopPropagation(); catFilter.clear(); renderChips(); render(); };
  acts.append(bAll,bNone); menu.appendChild(acts);
  const val=$("typeVal"); if(val) val.textContent = catFilter.size>=CATS.length ? t("dd.all") : (catFilter.size+"/"+CATS.length);
}
function renderSrcChips(){
  const menu=$("srcMenu"); if(!menu) return; menu.innerHTML="";
  const srcs=[...knownSources].sort();
  const val=$("srcVal");
  if(srcs.length===0){ menu.appendChild(elp("dd-empty",t("dd.waiting"))); if(val) val.textContent=t("dd.all"); return; }
  for(const s of srcs){
    const on = srcFilter.size===0 || srcFilter.has(s);
    menu.appendChild(ddItem(s, sourceColor(s), on, ()=>{
      if(srcFilter.size===0){ srcs.forEach(x=>srcFilter.add(x)); }   // materialize "all" before toggling one off
      if(srcFilter.has(s)) srcFilter.delete(s); else srcFilter.add(s);
      if(srcFilter.size===srcs.length) srcFilter.clear();            // back to implicit "all"
      renderSrcChips(); render();
    }));
  }
  if(val) val.textContent = srcFilter.size===0 ? t("dd.all") : (srcFilter.size+"/"+srcs.length);
}
function renderProjChips(){
  const menu=$("projMenu"); if(!menu) return; menu.innerHTML="";
  const projs=[...knownProjects].sort((a,b)=> projLabel(a).localeCompare(projLabel(b)));
  const val=$("projVal");
  if(projs.length===0){ menu.appendChild(elp("dd-empty",t("dd.waiting"))); if(val) val.textContent=t("dd.all"); return; }
  for(const p of projs){
    const on = projFilter.size===0 || projFilter.has(p);
    const item = ddItem(projLabel(p), projectColor(p), on, ()=>{
      if(projFilter.size===0){ projs.forEach(x=>projFilter.add(x)); }
      if(projFilter.has(p)) projFilter.delete(p); else projFilter.add(p);
      if(projFilter.size===projs.length) projFilter.clear();
      renderProjChips(); render();
    });
    item.title = p || t("proj.unknown");
    menu.appendChild(item);
  }
  if(val) val.textContent = projFilter.size===0 ? t("dd.all") : (projFilter.size+"/"+projs.length);
}
function setFollow(v){ follow=v; $("followBtn").classList.toggle("on",v); if(v){ const l=$("list"); l.scrollTop = (view==="tree") ? 0 : l.scrollHeight; } }
function setFollowUI(v){ follow=v; $("followBtn").classList.toggle("on",v); }
let everLive = false;
function setConn(live){
  const dot=$("dot"), conn=$("conn");
  if(live) everLive = true;
  dot.className="dot "+(live?"on":"off");
  connLabelState = live ? "live" : (everLive ? "offline" : "connecting");
  conn.textContent = t("conn."+connLabelState);
}

let raf=0;
function scheduleRender(){ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0; render(); }); }

function addEvent(ev){
  if(!ev || ev._event==="_ping") return;
  // Dedupe cross-fired duplicates: the same action captured by two hook
  // registrations is identical except for _source (and a sub-millisecond _ts).
  const { _source, _ts, ...ident } = ev;
  const sig = JSON.stringify(ident);
  if(seen.has(sig)) return; seen.add(sig);
  events.push(ev);
  const src=srcOf(ev);
  if(!knownSources.has(src)){ knownSources.add(src); renderSrcChips(); }
  const proj=projectOf(ev);
  if(!knownProjects.has(proj)){ knownProjects.add(proj); renderProjChips(); }
  if(ev.conversation_id || ev.session_id){ const key=sessionKeyOf(ev); const sel=$("session"); if(![...sel.options].some(o=>o.value===key)){ const o=document.createElement("option"); o.value=key; o.textContent=src+" · "+String(key).slice(0,8); sel.appendChild(o); } }
  scheduleRender();
}

async function boot(){
  applyStaticText();
  renderChips(); renderSrcChips(); renderProjChips();
  try{ const r=await fetch("/api/events"); const arr=await r.json(); arr.forEach(addEvent); }catch(e){}
  render();
  const list=$("list"); list.scrollTop = (view==="tree") ? 0 : list.scrollHeight;
  const es=new EventSource("/stream");
  es.onopen=()=>setConn(true);
  es.onerror=()=>setConn(false);
  es.onmessage=(m)=>{ try{ addEvent(JSON.parse(m.data)); }catch(e){} };
}

function setView(v){
  view=v;
  $("btnTree").classList.toggle("active", v==="tree");
  $("btnTl").classList.toggle("active", v==="timeline");
  $("btnHist").classList.toggle("active", v==="history");
  render(); flashList();
}
$("btnTree").onclick=()=>setView("tree");
$("btnTl").onclick=()=>setView("timeline");
$("btnHist").onclick=()=>setView("history");
$("followBtn").onclick=()=> setFollow(!follow);
$("langBtnZh").onclick=()=> setLang("zh");
$("langBtnEn").onclick=()=> setLang("en");
$("session").onchange=(e)=>{ sessionFilter=e.target.value; render(); };
$("search").oninput=(e)=>{ search=e.target.value; render(); };
function closeDropdowns(except){ document.querySelectorAll(".dropdown.open").forEach(d=>{ if(d!==except) d.classList.remove("open"); }); }
function wireDropdown(dropId, btnId){
  const drop=$(dropId), btn=$(btnId); if(!drop||!btn) return;
  btn.onclick=(e)=>{
    e.stopPropagation();
    const open=drop.classList.contains("open");
    closeDropdowns();
    if(!open){
      drop.classList.add("open");
      const menu=drop.querySelector(".dd-menu");
      if(menu && gsapOK()) window.gsap.fromTo(menu, { opacity:0, y:-4 }, { opacity:1, y:0, duration:.14, ease:"power2.out", clearProps:"transform,opacity" });
    }
  };
}
wireDropdown("srcDrop","srcBtn"); wireDropdown("typeDrop","typeBtn"); wireDropdown("projDrop","projBtn");
document.addEventListener("click",(e)=>{
  if(!e.target.closest(".dropdown")) closeDropdowns();
  if(!e.target.closest(".flow-tokens")) closeAllTokenPops();
});
$("list").addEventListener("scroll",()=>{ const l=$("list"); const near=(view==="tree") ? (l.scrollTop<48) : ((l.scrollHeight-l.scrollTop-l.clientHeight)<48); if(near!==follow) setFollowUI(near); });

boot();
</script>
