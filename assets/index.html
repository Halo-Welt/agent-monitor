<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Monitor</title>
<style>
  :root {
    /* clean light palette */
    --bg:#fbfbfc; --panel:#ffffff; --panel-2:#f3f4f6; --panel-3:#f7f8fa;
    --border:#e6e8ec; --border-soft:#eef0f3;
    --fg:#1f2328; --muted:#616a75; --faint:#98a0ab;
    --accent:#2f6feb; --accent-soft:#eef3fe;
    --shadow:0 1px 2px rgba(16,24,40,.05);
    --shadow-pop:0 6px 20px -8px rgba(16,24,40,.16);
    --ring:0 0 0 3px rgba(47,111,235,.13);
    --radius:10px; --radius-sm:7px;
    --ok:#1a7f37; --fail:#cf222e; --run:#9a6700;
    --c-prompt:#0969da; --c-response:#1a7f37; --c-thought:#8250df; --c-tool:#9a6700;
    --c-shell:#cf222e; --c-mcp:#1b7c83; --c-file:#bf3989; --c-subagent:#bc4c00; --c-lifecycle:#6e7781;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; color:var(--fg); background:var(--bg); font:13.5px/1.55 var(--sans);
    display:flex; flex-direction:column; height:100vh; -webkit-font-smoothing:antialiased;
  }
  ::selection { background:rgba(47,111,235,.16); }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-thumb { background:#d7dbe1; border:3px solid transparent; background-clip:content-box; border-radius:999px; }
  ::-webkit-scrollbar-thumb:hover { background:#c3c9d2; background-clip:content-box; }
  ::-webkit-scrollbar-track { background:transparent; }

  /* ---------------- masthead ---------------- */
  header { position:sticky; top:0; z-index:20; background:var(--panel); border-bottom:1px solid var(--border); }
  .topbar { display:flex; align-items:center; gap:12px; padding:11px 18px; flex-wrap:wrap; }
  .brand { display:flex; align-items:baseline; gap:9px; }
  .brand h1 { font-size:15px; margin:0; font-weight:650; letter-spacing:.1px; display:inline-flex; align-items:center; gap:9px; color:var(--fg); }
  .brand h1::before { content:""; width:9px; height:9px; border-radius:2px; background:var(--accent); }
  .brand .sub { color:var(--faint); font-size:11px; }
  .spacer { flex:1; }
  .pill { display:inline-flex; align-items:center; gap:6px; background:var(--panel); border:1px solid var(--border);
          border-radius:999px; padding:4px 10px; color:var(--muted); font-size:11px; font-variant-numeric:tabular-nums; }
  .dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .dot.on { background:var(--ok); }
  .dot.off { background:var(--faint); }
  .seg { display:inline-flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; background:var(--panel-3); }
  .seg button { background:transparent; color:var(--muted); border:0; padding:5px 12px; cursor:pointer; font-size:12px; font-weight:500;
    transition:color .12s, background .12s; }
  .seg button:hover { color:var(--fg); }
  .seg button.active { background:var(--accent); color:#fff; font-weight:600; }
  .toggle { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--border); border-radius:8px;
            padding:5px 10px; cursor:pointer; background:var(--panel); color:var(--muted); font-size:12px; font-weight:500; user-select:none;
            transition:border-color .12s, color .12s; }
  .toggle:hover { color:var(--fg); }
  .toggle .sw { width:26px; height:15px; border-radius:999px; background:#d7dbe1; position:relative; transition:background .15s; flex-shrink:0; }
  .toggle .sw::after { content:""; position:absolute; top:2px; left:2px; width:11px; height:11px; border-radius:50%; background:#fff;
                       box-shadow:0 1px 2px rgba(0,0,0,.2); transition:transform .15s; }
  .toggle.on { color:var(--fg); border-color:var(--accent); }
  .toggle.on .sw { background:var(--accent); }
  .toggle.on .sw::after { transform:translateX(11px); }

  /* ---------------- filter bar ---------------- */
  .filterbar { display:flex; align-items:center; gap:10px; padding:9px 18px; flex-wrap:wrap; border-top:1px solid var(--border-soft); }
  .filterbar .grp { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .flabel { color:var(--faint); font-size:10px; text-transform:uppercase; letter-spacing:.5px; margin-right:2px; }
  input[type=text], select {
    background:var(--panel); color:var(--fg); border:1px solid var(--border); border-radius:8px;
    padding:6px 10px; font-size:12px; outline:none; transition:border-color .12s, box-shadow .12s;
  }
  select { color:var(--muted); }
  input[type=text] { width:200px; }
  input[type=text]::placeholder { color:var(--faint); }
  input[type=text]:focus, select:focus { border-color:var(--accent); box-shadow:var(--ring); }
  .chip-link { background:none; border:0; color:var(--accent); font-size:11px; cursor:pointer; padding:4px 8px; border-radius:6px; transition:background .12s; }
  .chip-link:hover { background:var(--panel-2); }

  /* filter dropdowns (source / type) */
  .dropdown { position:relative; }
  .dd-btn { display:inline-flex; align-items:center; gap:7px; background:var(--panel); border:1px solid var(--border); border-radius:8px;
    padding:6px 10px; font-size:12px; color:var(--fg); cursor:pointer; transition:border-color .12s, box-shadow .12s; }
  .dd-btn:hover { border-color:#d5d9df; }
  .dd-btn .flabel { margin:0; }
  .dd-val { color:var(--muted); font-variant-numeric:tabular-nums; }
  .dd-caret { color:var(--faint); font-size:9px; transition:transform .15s; }
  .dropdown.open .dd-btn { border-color:var(--accent); box-shadow:var(--ring); }
  .dropdown.open .dd-caret { transform:rotate(180deg); }
  .dd-menu { position:absolute; top:calc(100% + 6px); left:0; z-index:40; min-width:200px; background:var(--panel);
    border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-pop); padding:6px; display:none; max-height:344px; overflow:auto; }
  .dropdown.open .dd-menu { display:block; }
  .dd-item { display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:7px; cursor:pointer; font-size:12px; color:var(--fg); user-select:none; }
  .dd-item:hover { background:var(--panel-2); }
  .dd-check { width:15px; height:15px; border:1px solid var(--border); border-radius:4px; flex-shrink:0; display:grid; place-items:center;
    font-size:10px; line-height:1; color:transparent; background:var(--panel); }
  .dd-item.on .dd-check { background:var(--accent); border-color:var(--accent); color:#fff; }
  .dd-item .cdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dd-item .dd-name { flex:1; text-transform:capitalize; }
  .dd-sep { height:1px; background:var(--border-soft); margin:5px 2px; }
  .dd-actions { display:flex; gap:4px; padding:1px 2px; }
  .dd-empty { color:var(--faint); font-size:12px; padding:6px 8px; }

  /* ---------------- main / lists ---------------- */
  main { flex:1; display:flex; min-height:0; }
  #list { flex:1; overflow:auto; padding:14px 16px; }
  #detail { width:40%; max-width:600px; min-width:330px; border-left:1px solid var(--border); background:var(--panel); overflow:auto; }
  .detail-head { position:sticky; top:0; background:var(--panel); border-bottom:1px solid var(--border-soft); padding:12px 18px; z-index:2; }
  .detail-head h2 { font-size:11px; text-transform:uppercase; color:var(--faint); letter-spacing:.7px; margin:0; font-weight:600; }
  .detail-body { padding:16px 18px; }
  .banner { background:var(--panel-3); border:1px solid var(--border-soft); border-left:3px solid var(--accent);
            color:var(--muted); border-radius:9px; padding:10px 13px; margin-bottom:14px; font-size:11.5px; }
  .banner b { color:var(--fg); font-weight:600; }
  .empty { color:var(--faint); padding:48px 20px; text-align:center; }

  details.session { border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px;
    background:var(--panel); overflow:hidden; transition:border-color .15s ease; }
  details.session:hover { border-color:#d5d9df; }
  details.session > summary { padding:12px 15px; cursor:pointer; list-style:none; display:flex; align-items:center; gap:10px; font-weight:600; }
  details.session > summary::-webkit-details-marker { display:none; }
  details.session > summary:hover { background:var(--panel-3); }
  .sess-id { font-family:var(--mono); font-size:12px; color:var(--fg); }
  .sess-model { color:var(--muted); font-weight:400; font-size:11px; font-family:var(--mono); }
  .src-badge { font-size:10px; font-weight:600; letter-spacing:.2px; padding:2px 8px; border-radius:5px; color:#fff;
    text-transform:lowercase; flex-shrink:0; }
  details.turn { margin:0 11px 9px; border:1px solid var(--border-soft); border-radius:9px; background:var(--panel-3); overflow:hidden; }
  details.turn > summary { padding:8px 12px; cursor:pointer; list-style:none; color:var(--muted); font-size:12px; display:flex; align-items:center; gap:9px; }
  details.turn > summary::-webkit-details-marker { display:none; }
  details.turn > summary:hover { background:var(--panel-2); }
  .turn-body { padding:5px 6px 6px; }
  .node { display:flex; align-items:center; gap:10px; padding:7px 10px; margin:2px 4px; border-radius:8px; cursor:pointer;
          border:1px solid transparent; position:relative; transition:background .12s ease; }
  .node:hover { background:var(--panel-2); }
  .node.sel { background:var(--accent-soft); border-color:rgba(47,111,235,.28); }
  .node.sel::before { content:""; position:absolute; left:-1px; top:6px; bottom:6px; width:3px; border-radius:3px; background:var(--accent); }
  .node.active .st.run { animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(154,103,0,.4);} 50%{ box-shadow:0 0 0 4px rgba(154,103,0,0);} }
  .tag { font-size:10px; letter-spacing:.2px; padding:2px 7px; border-radius:5px; font-weight:600; flex-shrink:0; text-transform:lowercase;
         border:1px solid transparent; }
  .label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--fg); }
  .meta { color:var(--faint); font:11px/1 var(--mono); flex-shrink:0; font-variant-numeric:tabular-nums; }
  .st { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .st.ok{ background:var(--ok);} .st.fail{ background:var(--fail);} .st.run{ background:var(--run);}
  .tl { position:relative; padding-left:20px; }
  .tl::before { content:""; position:absolute; left:6px; top:4px; bottom:4px; width:1px; background:var(--border); }
  .tlrow { position:relative; display:flex; align-items:center; gap:10px; padding:6px 10px; border-radius:8px; cursor:pointer; transition:background .12s ease; }
  .tlrow:hover { background:var(--panel-2); }
  .tlrow.sel { background:var(--accent-soft); }
  .tlrow::before { content:""; position:absolute; left:-17px; width:7px; height:7px; border-radius:50%; background:var(--panel); border:2px solid var(--border); }
  .tlrow.sel::before { border-color:var(--accent); }
  .time { color:var(--faint); font:11px/1 var(--mono); font-variant-numeric:tabular-nums; flex-shrink:0; }

  /* ---------------- detail inspector ---------------- */
  .d-section { margin-bottom:16px; }
  .d-title { font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--faint); margin:0 0 8px; display:flex; align-items:center; gap:8px; font-weight:600; }
  .kv { display:grid; grid-template-columns:auto 1fr; gap:5px 14px; font-size:12px; }
  .kv .k { color:var(--muted); font-family:var(--mono); font-size:11px; white-space:nowrap; }
  .kv .v { color:var(--fg); word-break:break-word; }
  .prose { background:var(--panel-3); border:1px solid var(--border-soft); border-radius:9px; padding:12px 14px; white-space:pre-wrap;
           word-break:break-word; font-size:13px; line-height:1.65; }
  .prose.thought { border-left:3px solid var(--c-thought); background:rgba(130,80,223,.05); color:#4b3b7a; }
  .prose.prompt { border-left:3px solid var(--c-prompt); }
  .prose.response { border-left:3px solid var(--c-response); }
  .term { background:#0d1117; color:#d1d9e0; border-radius:9px; padding:12px 14px; font-family:var(--mono); font-size:12px;
          white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:340px; }
  .term .cmd { color:#79c0ff; display:block; margin-bottom:6px; }
  .term .cmd::before { content:"$ "; color:#7ee787; }
  .code { background:var(--panel-3); border:1px solid var(--border-soft); border-radius:9px; padding:11px 13px; font-family:var(--mono);
          font-size:12px; white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:340px; color:var(--fg); }
  .diff { border:1px solid var(--border-soft); border-radius:9px; overflow:auto; max-height:360px; font-family:var(--mono); font-size:12px; }
  .diff .dl { padding:1px 12px; white-space:pre-wrap; word-break:break-word; }
  .diff .add { background:rgba(26,127,55,.12); color:#0f5323; }
  .diff .del { background:rgba(207,34,46,.11); color:#82161f; }
  .diff .hunk { background:rgba(9,105,218,.10); color:#0a4a9e; }
  .diff .ctx { color:var(--muted); }
  .chipline { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .badge { font-size:11px; padding:2px 9px; border-radius:999px; border:1px solid transparent; font-weight:600; }
  .st-ok { background:rgba(26,127,55,.11); color:var(--ok); }
  .st-fail { background:rgba(207,34,46,.11); color:var(--fail); }
  .st-run { background:rgba(154,103,0,.13); color:var(--run); }
  .d-link { color:var(--accent); text-decoration:none; font-size:12px; cursor:pointer; }
  .d-link:hover { text-decoration:underline; }
  .ev-sep { color:var(--faint); font-size:11px; margin:10px 0 4px; font-family:var(--mono); }
  .hooksec .ev-sep { color:var(--muted); font-weight:600; margin-top:14px; }
  .hookev { background:var(--panel-3); border:1px solid var(--border-soft); border-radius:9px; padding:11px 13px; margin:5px 0 0;
    font:11.5px/1.55 var(--mono); color:#48515c; white-space:pre-wrap; word-break:break-word; overflow:auto; max-height:300px; }

  /* ---------------- history view ---------------- */
  .hist-bar { display:flex; align-items:center; gap:10px; padding:2px 4px 12px; }
  .hist-count { color:var(--muted); font-size:12px; font-variant-numeric:tabular-nums; }
  .hbtn { border:1px solid var(--border); background:var(--panel); color:var(--muted); border-radius:8px; padding:4px 10px;
    font-size:11px; font-weight:600; cursor:pointer; transition:background .12s, color .12s, border-color .12s; }
  .hbtn:hover { background:var(--panel-2); color:var(--fg); }
  .hbtn.danger { color:var(--fail); border-color:rgba(207,34,46,.3); }
  .hbtn.danger:hover { background:rgba(207,34,46,.07); color:var(--fail); }
  .hist-card { border:1px solid var(--border); border-radius:var(--radius); background:var(--panel);
    padding:13px 15px; margin-bottom:10px; cursor:pointer; transition:border-color .15s ease, box-shadow .15s ease; }
  .hist-card:hover { border-color:#d5d9df; box-shadow:var(--shadow); }
  .hist-card.sel { border-color:var(--accent); box-shadow:var(--ring); }
  .hist-card.pinned { border-left:3px solid var(--accent); }
  .hist-head { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
  .hist-id { font-family:var(--mono); font-size:12px; font-weight:650; color:var(--fg); }
  .hist-model { color:var(--muted); font-size:11px; font-family:var(--mono); }
  .hist-pin { color:var(--accent); font-size:12px; }
  .hist-when { color:var(--faint); font:11px/1 var(--mono); font-variant-numeric:tabular-nums; }
  .hist-title { font-size:13.5px; font-weight:600; color:var(--fg); margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hist-meta { color:var(--muted); font:11px/1 var(--mono); margin-bottom:4px; font-variant-numeric:tabular-nums; }
  .hist-reply { color:var(--faint); font-size:12px; margin-bottom:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hist-acts { display:flex; gap:6px; flex-wrap:wrap; }
  .hist-hidden { margin-top:6px; }
  .hist-hidden > summary { cursor:pointer; color:var(--muted); font-size:12px; padding:6px 4px; list-style:none; user-select:none; }
  .hist-hidden > summary::-webkit-details-marker { display:none; }
  .hist-hidden > summary::before { content:"▸ "; color:var(--faint); }
  .hist-hidden[open] > summary::before { content:"▾ "; }
  .hist-hidden[open] > summary { color:var(--fg); }
  .replay-turn { margin-bottom:10px; padding-bottom:10px; border-bottom:1px dashed var(--border-soft); }
  .replay-turn:last-child { border-bottom:0; }

  @media (max-width: 720px) {
    .topbar { gap:8px; padding:10px 13px; }
    .brand .sub { display:none; }
    .filterbar { padding:9px 13px; }
    input[type=text] { width:100%; flex:1 1 140px; }
    main { flex-direction:column; }
    #detail { width:auto; max-width:none; min-width:0; border-left:0; border-top:1px solid var(--border); max-height:48%; }
    .detail-head { padding:10px 13px; }
    .detail-body { padding:13px; }
  }

  @media (prefers-reduced-motion: reduce) { *, ::before, ::after { animation:none !important; transition:none !important; } }
</style>
</head>
<body class="in-browser">
<header>
  <div class="topbar">
    <div class="brand"><h1>Agent Monitor</h1><span class="sub">multi-engine agent observability</span></div>
    <div class="spacer"></div>
    <span class="pill"><span id="dot" class="dot off"></span><span id="conn">connecting</span></span>
    <span class="pill" id="count">0 events</span>
    <div class="seg">
      <button id="btnTree" class="active">Tree</button>
      <button id="btnTl">Timeline</button>
      <button id="btnHist">History</button>
    </div>
    <div id="followBtn" class="toggle on" title="Auto-scroll to newest events"><span class="sw"></span><span>Follow</span></div>
  </div>
  <div class="filterbar">
    <input type="text" id="search" placeholder="filter by text…" />
    <select id="session"><option value="">All sessions</option></select>
    <div class="dropdown" id="srcDrop">
      <button class="dd-btn" id="srcBtn" type="button"><span class="flabel">source</span><span class="dd-val" id="srcVal">all</span><span class="dd-caret">▾</span></button>
      <div class="dd-menu" id="srcMenu"></div>
    </div>
    <div class="dropdown" id="typeDrop">
      <button class="dd-btn" id="typeBtn" type="button"><span class="flabel">type</span><span class="dd-val" id="typeVal">all</span><span class="dd-caret">▾</span></button>
      <div class="dd-menu" id="typeMenu"></div>
    </div>
  </div>
</header>
<main>
  <div id="list"></div>
  <div id="detail">
    <div class="detail-head"><h2>Details</h2></div>
    <div class="detail-body"><div id="detailBody" class="empty">Click a node to inspect it — rich view plus raw hook events.</div></div>
  </div>
</main>
<script src="/gsap.min.js"></script>
<script>
// ---- multi-engine event normalization (case-insensitive alias map) ----
// Covers Cursor (camelCase), Claude Code / Codex (PascalCase) and any agent
// reusing the common hook vocabulary. Add a new agent by tagging its events
// with _source; if it uses novel event names, add entries below.
const EVENT_ALIASES = {
  beforesubmitprompt:"prompt", userpromptsubmit:"prompt",
  afteragentresponse:"response", assistantmessage:"response",
  afteragentthought:"thought", thinking:"thought",
  pretooluse:"tool", posttooluse:"tool", posttoolusefailure:"tool", posttoolbatch:"tool",
  toolexecution:"tool", permissionrequest:"tool", permissiondenied:"tool",
  beforeshellexecution:"shell", aftershellexecution:"shell",
  beforemcpexecution:"mcp", aftermcpexecution:"mcp",
  beforereadfile:"file", afterfileedit:"file", beforetabfileread:"file", aftertabfileedit:"file",
  subagentstart:"subagent", subagentstop:"subagent",
  sessionstart:"lifecycle", sessionend:"lifecycle", stop:"lifecycle", stopfailure:"lifecycle",
  precompact:"lifecycle", postcompact:"lifecycle", notification:"lifecycle", turnmetadata:"lifecycle",
  workspaceopen:"lifecycle",
};
const CATS = ["prompt","response","thought","tool","shell","mcp","file","subagent","lifecycle"];
const CATVAR = { prompt:"--c-prompt", response:"--c-response", thought:"--c-thought", tool:"--c-tool",
  shell:"--c-shell", mcp:"--c-mcp", file:"--c-file", subagent:"--c-subagent", lifecycle:"--c-lifecycle", unknown:"--c-lifecycle" };
const SOURCE_COLORS = { cursor:"#0969da", claude:"#d97757", codex:"#10a37f", workbuddy:"#8250df", unknown:"#8c959f" };
const SRC_PALETTE = ["#0969da","#d97757","#10a37f","#8250df","#bf3989","#1b7c83","#bc4c00","#9a6700"];
const dynSrcColor = {};
function sourceColor(s){
  if(SOURCE_COLORS[s]) return SOURCE_COLORS[s];
  if(!dynSrcColor[s]){ const i=Object.keys(dynSrcColor).length; dynSrcColor[s]=SRC_PALETTE[i%SRC_PALETTE.length]; }
  return dynSrcColor[s];
}

let events = [];
let seen = new Set();
let view = "tree";
let sessionFilter = "";
let search = "";
let follow = true;
let selectedKey = null;
const catFilter = new Set(CATS);
const srcFilter = new Set();      // empty = all sources
const knownSources = new Set();

// ---- History view state (pins/hidden persisted locally) ----
function loadSet(k){ try{ return new Set(JSON.parse(localStorage.getItem(k)||"[]")); }catch{ return new Set(); } }
function saveSet(k,s){ try{ localStorage.setItem(k, JSON.stringify([...s])); }catch{} }
const pins = loadSet("am:pins");
const hidden = loadSet("am:hidden");
let replayKey = null;

// ---- GSAP-powered entrance/transition animations (graceful fallback) ----
// GSAP is vendored locally at /gsap.min.js. If it fails to load or the user
// prefers reduced motion, every animation is skipped and the panel still works.
const REDUCE = !!(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
const animatedKeys = new Set();
let firstRender = true;
function gsapOK(){ return !!window.gsap && !REDUCE; }
function animateEntrance(container){
  const fresh=[];
  container.querySelectorAll("[data-anim-key]").forEach(el=>{
    const k=el.getAttribute("data-anim-key");
    if(!animatedKeys.has(k)){ animatedKeys.add(k); fresh.push(el); }
  });
  if(firstRender){ firstRender=false; return; }   // seed the initial batch without animating it
  if(!gsapOK() || !fresh.length) return;
  window.gsap.from(fresh, { opacity:0, y:7, duration:.3, ease:"power2.out", stagger:0.018, clearProps:"transform,opacity" });
}
function flashList(){ if(gsapOK()) window.gsap.fromTo($("list"), { opacity:.4 }, { opacity:1, duration:.24, ease:"power1.out" }); }

const $ = (id)=>document.getElementById(id);
function esc(s){ return String(s==null?"":s); }
function clip(s,n){ s=esc(s).replace(/\s+/g," ").trim(); return s.length>n? s.slice(0,n)+"…" : s; }
function timeOf(ts){ try{ const d=new Date(ts); return d.toLocaleTimeString("en-GB",{hour12:false})+"."+String(d.getMilliseconds()).padStart(3,"0"); }catch{ return ""; } }
function cvar(name){ return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
function pick(evs, keys){ for(const e of evs){ for(const k of keys){ if(e[k]!=null && e[k]!=="") return e[k]; } } return undefined; }
function firstWith(evs, keys){ return evs.find(e=>keys.some(k=>e[k]!=null && e[k]!=="")); }
// True engine = the host that actually emitted the event. Cursor runs hooks from
// BOTH ~/.cursor/hooks.json (tagged "cursor") AND any registered in
// ~/.claude/settings.json (tagged "claude"), so the CLI-arg tag is wrong for a
// Cursor-originated event. Cursor events always carry cursor_version — trust it.
// A genuine Claude Code / Codex CLI event has no cursor_version, so it is unaffected.
function srcOf(ev){ if(ev && ev.cursor_version) return "cursor"; return (ev && ev._source) || "unknown"; }
// Session identity: Cursor uses conversation_id; Claude Code has only session_id.
// Fall back through both so each real session is grouped on its own.
function sessionKeyOf(ev){ return ev.conversation_id || ev.session_id || (srcOf(ev)+":no-session"); }
function replyText(ev){ return ev.text || ev.message || ev.last_assistant_message || ev.thinking; }

// normalized tool_input.command / path helpers (Claude/Codex nest under tool_input)
function toolCmd(ev){ return ev.command || (ev.tool_input && (ev.tool_input.command || ev.tool_input.cmd)) || undefined; }
function toolPath(ev){ return ev.file_path || ev.path || (ev.tool_input && (ev.tool_input.file_path || ev.tool_input.path)) || undefined; }

function catOf(ev){
  // Claude Code has no dedicated response event — its final reply rides on the
  // Stop event as last_assistant_message. Surface it as a response.
  if(ev.last_assistant_message!=null && ev.last_assistant_message!=="") return "response";
  const raw = String(ev._event||"").toLowerCase();
  let cat = EVENT_ALIASES[raw] || "unknown";
  if(cat==="tool"){
    const tn = String(ev.tool_name||"").toLowerCase();
    if(/bash|shell|terminal|(^|_)exec/.test(tn)) return "shell";
    if(/read|write|edit|apply_patch|multiedit|createfile|str_replace/.test(tn)) return "file";
    if(/^mcp[:_]|mcp__/.test(tn)) return "mcp";
  }
  return cat;
}

function summarize(ev){
  const c = catOf(ev);
  if(c==="prompt") return clip(ev.prompt,120) || "(prompt)";
  if(c==="response") return clip(ev.text||ev.message||ev.last_assistant_message,120) || "(response)";
  if(c==="thought") return clip(ev.text||ev.thinking,120) || "(thinking)";
  if(c==="shell") return clip(toolCmd(ev),120) || "(shell)";
  if(c==="file") return clip(toolPath(ev),120) || "(file)";
  if(c==="mcp") return clip(ev.tool_name||ev.url||ev.server,120) || "(mcp)";
  if(c==="subagent") return clip((ev.subagent_type?ev.subagent_type+": ":"")+(ev.task||ev.description||ev.summary||""),120) || "(subagent)";
  if(c==="tool") return clip((ev.tool_name?ev.tool_name:"tool")+(ev.tool_input?" "+clip(JSON.stringify(ev.tool_input),80):""),120);
  return ev._event + (ev.reason?" · "+ev.reason:"") + (ev.status?" · "+ev.status:"");
}
function keyOf(ev){ return ev.tool_use_id || ev.subagent_id || (ev._event+"|"+ev._ts+"|"+(ev.generation_id||"")); }

function build(){
  const filtered = events.filter(ev=>{
    if(ev._event==="_ping") return false;
    if(sessionFilter && sessionKeyOf(ev)!==sessionFilter) return false;
    if(srcFilter.size && !srcFilter.has(srcOf(ev))) return false;
    if(!catFilter.has(catOf(ev))) return false;
    if(search){ const hay=(ev._event+" "+srcOf(ev)+" "+summarize(ev)).toLowerCase(); if(!hay.includes(search.toLowerCase())) return false; }
    return true;
  });
  const sessions = new Map();
  for(const ev of filtered){
    const cid = sessionKeyOf(ev);
    if(!sessions.has(cid)) sessions.set(cid,{ cid, src:srcOf(ev), model:ev.model||ev.model_id||"", nodes:new Map(), firstTs:ev._ts });
    const S = sessions.get(cid);
    if(ev.model||ev.model_id) S.model = ev.model||ev.model_id;
    const k = keyOf(ev);
    if(!S.nodes.has(k)) S.nodes.set(k,{ key:cid+"::"+k, cat:catOf(ev), gen:ev.generation_id||"", evs:[], firstTs:ev._ts });
    S.nodes.get(k).evs.push(ev);
  }
  return sessions;
}

function nodeState(node){
  const evs = node.evs;
  if(evs.some(e=>e._event==="postToolUseFailure"||/failure$/i.test(e._event))) return "fail";
  const st = evs.find(e=>e.status)?.status;
  if(st==="error"||st==="aborted"||st==="failed") return "fail";
  const done = evs.some(e=>/^(post|after)|Stop$|^stop$|End$/i.test(e._event)) || st==="completed";
  return done? "ok":"run";
}
function nodeDuration(node){
  const d = node.evs.map(e=>e.duration||e.duration_ms).find(x=>typeof x==="number");
  if(typeof d==="number") return d>=1000? (d/1000).toFixed(1)+"s" : d+"ms";
  if(node.evs.length>1){ const t=node.evs.map(e=>+new Date(e._ts)).filter(x=>x); if(t.length>1){ const ms=Math.max(...t)-Math.min(...t); return ms>=1000?(ms/1000).toFixed(1)+"s":ms+"ms"; } }
  return "";
}
function nodeLabel(node){ const base=node.evs.find(e=>summarize(e))||node.evs[0]; return summarize(base); }

function tag(cat, text){
  const t=document.createElement("span"); t.className="tag"; t.textContent=text||cat;
  const col=cvar(CATVAR[cat]||"--c-lifecycle");
  t.style.color=col;
  t.style.background="color-mix(in srgb, "+col+" 11%, white)";
  t.style.borderColor="color-mix(in srgb, "+col+" 26%, white)";
  return t;
}
function srcBadge(src){ const b=document.createElement("span"); b.className="src-badge"; b.textContent=src; b.style.background=sourceColor(src); return b; }

function render(){
  $("count").textContent = events.filter(e=>e._event!=="_ping").length + " events";
  const list = $("list");
  const atBottom = follow;
  const prevTop = list.scrollTop;
  const frag = document.createDocumentFragment();
  const banner=document.createElement("div"); banner.className="banner"; banner.innerHTML=BANNER; frag.appendChild(banner);

  if(view==="history"){
    const n = renderHistory(frag);
    if(!n){ frag.appendChild(elp("empty","No sessions match — start any agent and its conversation history shows up here.")); }
    list.innerHTML=""; list.appendChild(frag); animateEntrance(list);
    list.scrollTop = prevTop;   // history is a browse view; don't auto-jump
    return;
  }

  const sessions = build();
  if(sessions.size===0){
    const e=document.createElement("div"); e.className="empty";
    e.textContent="No events match. Use any connected agent (Cursor / Claude Code / Codex …) — steps stream in live.";
    frag.appendChild(e); list.innerHTML=""; list.appendChild(frag); return;
  }
  if(view==="timeline"){
    const rows=[]; for(const S of sessions.values()) for(const n of S.nodes.values()) for(const ev of n.evs) rows.push(ev);
    rows.sort((a,b)=> new Date(a._ts)-new Date(b._ts));
    const wrap=document.createElement("div"); wrap.className="tl";
    for(const ev of rows) wrap.appendChild(tlRow(ev));
    frag.appendChild(wrap);
  } else {
    for(const S of sessions.values()) frag.appendChild(treeSession(S));
  }
  list.innerHTML=""; list.appendChild(frag);
  animateEntrance(list);
  if(atBottom) list.scrollTop = list.scrollHeight; else list.scrollTop = prevTop;
}

function tlRow(ev){
  const row=document.createElement("div"); row.className="tlrow";
  const k=(ev.conversation_id||"")+"::ev::"+ev._ts+"::"+ev._event; if(selectedKey===k) row.classList.add("sel");
  row.setAttribute("data-anim-key", k);
  const c=catOf(ev);
  const time=document.createElement("span"); time.className="time"; time.textContent=timeOf(ev._ts);
  const lab=document.createElement("span"); lab.className="label"; lab.textContent=summarize(ev);
  row.append(time,srcBadge(srcOf(ev)),tag(c),lab);
  row.onclick=()=>{ selectedKey=k; showDetail([ev], c); render(); };
  return row;
}

function treeSession(S){
  const d=document.createElement("details"); d.className="session"; d.open=true;
  const sm=document.createElement("summary");
  sm.appendChild(srcBadge(S.src));
  const name=document.createElement("span"); name.className="sess-id"; name.textContent=String(S.cid).slice(0,8);
  const model=document.createElement("span"); model.className="sess-model"; model.textContent=S.model?("· "+S.model):"";
  const sp=document.createElement("span"); sp.style.flex="1";
  const cnt=document.createElement("span"); cnt.className="meta"; cnt.textContent=S.nodes.size+" nodes";
  sm.append(name,model,sp,cnt); d.appendChild(sm);

  const turns=new Map();
  for(const n of S.nodes.values()){ const g=n.gen||"—"; if(!turns.has(g)) turns.set(g,[]); turns.get(g).push(n); }
  for(const [g,nodes] of turns){
    nodes.sort((a,b)=> new Date(a.firstTs)-new Date(b.firstTs));
    if(g==="—"){ const body=document.createElement("div"); body.className="turn-body"; for(const n of nodes) body.appendChild(nodeEl(n)); d.appendChild(body); continue; }
    const td=document.createElement("details"); td.className="turn"; td.open=true;
    const ts=document.createElement("summary");
    const promptNode=nodes.find(n=>n.cat==="prompt");
    const tt=tag("lifecycle","turn "+g.slice(0,6));
    const tl=document.createElement("span"); tl.className="label"; tl.textContent=promptNode? clip(nodeLabel(promptNode),70):"";
    ts.append(tt,tl); td.appendChild(ts);
    const body=document.createElement("div"); body.className="turn-body";
    for(const n of nodes) body.appendChild(nodeEl(n));
    td.appendChild(body); d.appendChild(td);
  }
  return d;
}

function nodeEl(node){
  const el=document.createElement("div"); el.className="node"; if(selectedKey===node.key) el.classList.add("sel");
  el.setAttribute("data-anim-key", node.key);
  const state=nodeState(node); if(state==="run") el.classList.add("active");
  const st=document.createElement("span"); st.className="st "+state;
  const lab=document.createElement("span"); lab.className="label"; lab.textContent=nodeLabel(node);
  const meta=document.createElement("span"); meta.className="meta"; meta.textContent=nodeDuration(node);
  el.append(st,tag(node.cat),lab,meta);
  el.onclick=()=>{ selectedKey=node.key; showDetail(node.evs, node.cat); render(); };
  return el;
}

/* ---------------- rich detail renderers ---------------- */
function elp(cls, text){ const e=document.createElement("div"); if(cls) e.className=cls; if(text!=null) e.textContent=text; return e; }
function section(title, cat){ const s=elp("d-section"); const h=elp("d-title"); if(cat) h.appendChild(tag(cat)); const sp=document.createElement("span"); sp.textContent=title; h.appendChild(sp); s.appendChild(h); return s; }
function kvBlock(pairs){
  const g=elp("kv");
  for(const [k,v] of pairs){ if(v==null||v==="") continue; g.appendChild(elp("k",k)); const vv=elp("v"); vv.textContent=(typeof v==="object")?JSON.stringify(v):String(v); g.appendChild(vv); }
  return g;
}
function codeBlock(val, cls){ const c=elp(cls||"code"); c.textContent=(typeof val==="object")?JSON.stringify(val,null,2):String(val); return c; }
function diffBlock(text){
  const wrap=elp("diff");
  for(const line of String(text).split("\n")){
    const dl=elp("dl"); dl.textContent=line;
    const c=line[0];
    if(line.startsWith("@@")) dl.classList.add("hunk");
    else if(c==="+"&&!line.startsWith("+++")) dl.classList.add("add");
    else if(c==="-"&&!line.startsWith("---")) dl.classList.add("del");
    else dl.classList.add("ctx");
    wrap.appendChild(dl);
  }
  return wrap;
}
function statusBadge(st){ if(!st) return null; const b=elp("badge",st); b.classList.add(st==="completed"||st==="ok"?"st-ok":(st==="error"||st==="failed"||st==="aborted"?"st-fail":"st-run")); return b; }

function renderRich(evs, cat, opts){
  const out=document.createDocumentFragment();
  const src=srcOf(evs[0]||{});
  if(!(opts&&opts.noHead)){ const head=elp("chipline"); head.appendChild(srcBadge(src)); out.appendChild(head); }

  if(cat==="prompt"||cat==="response"||cat==="thought"){
    const txt=pick(evs,["prompt","text","message","thinking","last_assistant_message"]);
    const s=section(cat==="prompt"?"User prompt":cat==="response"?"Agent response":"Agent thinking", cat);
    if(txt!=null){ s.appendChild(elp("prose "+cat, String(txt))); } else { s.appendChild(elp("empty","(no text)")); }
    out.appendChild(s);
  }
  else if(cat==="shell"){
    const cmd=pick(evs,["command"])||(evs.map(toolCmd).find(x=>x)); const cwd=pick(evs,["cwd"]);
    const output=pick(evs,["output","stdout","result","result_json","tool_output"]);
    const s=section("Shell command", cat);
    const meta=firstWith(evs,["command","tool_input"])||evs[0];
    s.appendChild(kvBlock([["cwd",cwd],["exit",meta&&meta.exit_code],["status",pick(evs,["status"])],["duration",fmtDur(evs)]]));
    out.appendChild(s);
    const term=elp("term");
    if(cmd!=null){ const c=elp("cmd"); c.textContent=String(cmd); term.appendChild(c); }
    if(output!=null) term.appendChild(document.createTextNode(typeof output==="object"?JSON.stringify(output,null,2):String(output)));
    else term.appendChild(document.createTextNode("(no output captured)"));
    const os=section("Terminal output", null); os.appendChild(term); out.appendChild(os);
  }
  else if(cat==="file"){
    const fp=evs.map(toolPath).find(x=>x); const content=pick(evs,["content"]);
    const diff=pick(evs,["diff","patch","unified_diff"]);
    let edits=pick(evs,["edits","changes"]); if(!edits){ const ti=pick(evs,["tool_input"]); if(ti&&Array.isArray(ti.edits)) edits=ti.edits; }
    const s=section(evs.some(e=>/fileedit|write|apply_patch/i.test(e._event)||/write|edit|apply_patch/i.test(e.tool_name||""))?"File edit":"File read", cat);
    s.appendChild(kvBlock([["path",fp]])); out.appendChild(s);
    if(diff!=null){ const ds=section("Diff", null); ds.appendChild(diffBlock(diff)); out.appendChild(ds); }
    else if(Array.isArray(edits)){
      const ds=section("Edits", null);
      edits.forEach((ed,i)=>{ ds.appendChild(elp("ev-sep","edit #"+(i+1)));
        if(ed.old_string||ed.oldText) ds.appendChild(diffBlock(String(ed.old_string||ed.oldText).split("\n").map(l=>"-"+l).join("\n")));
        if(ed.new_string||ed.newText) ds.appendChild(diffBlock(String(ed.new_string||ed.newText).split("\n").map(l=>"+"+l).join("\n"))); });
      out.appendChild(ds);
    }
    else if(content!=null){ const cs=section("Content", null); cs.appendChild(codeBlock(content)); out.appendChild(cs); }
  }
  else if(cat==="tool"){
    const name=pick(evs,["tool_name"]); const input=pick(evs,["tool_input","input","args"]);
    const output=pick(evs,["tool_output","output","result","result_json"]); const failed=evs.some(e=>/failure$/i.test(e._event)||e._event==="postToolUseFailure");
    const err=pick(evs,["error","error_message","message"]);
    const s=section("Tool · "+(name||"tool"), cat);
    const chipline=elp("chipline"); const sb=statusBadge(failed?"failed":pick(evs,["status"])); if(sb) chipline.appendChild(sb);
    const dur=fmtDur(evs); if(dur){ const db=elp("badge",dur); db.classList.add("st-run"); chipline.appendChild(db); }
    if(chipline.childNodes.length) s.appendChild(chipline);
    out.appendChild(s);
    if(input!=null){ const is=section("Input", null); is.appendChild(codeBlock(input)); out.appendChild(is); }
    if(output!=null){ const os=section("Result", null); os.appendChild(codeBlock(output)); out.appendChild(os); }
    if(failed&&err!=null){ const es=section("Error", null); es.appendChild(codeBlock(err)); out.appendChild(es); }
  }
  else if(cat==="mcp"){
    const name=pick(evs,["tool_name"]); const url=pick(evs,["url","server","server_name"]);
    const input=pick(evs,["tool_input","input","params","arguments"]); const output=pick(evs,["result","result_json","output","response"]);
    const s=section("MCP · "+(name||url||"call"), cat);
    s.appendChild(kvBlock([["server",url],["tool",name],["status",pick(evs,["status"])],["duration",fmtDur(evs)]]));
    out.appendChild(s);
    if(input!=null){ const is=section("Input", null); is.appendChild(codeBlock(input)); out.appendChild(is); }
    if(output!=null){ const os=section("Result", null); os.appendChild(codeBlock(output)); out.appendChild(os); }
  }
  else if(cat==="subagent"){
    const type=pick(evs,["subagent_type"]); const model=pick(evs,["model","model_id","subagent_model"]);
    const task=pick(evs,["task","description","summary"]); const status=pick(evs,["status"]);
    const s=section("Subagent · "+(type||""), cat);
    const chipline=elp("chipline"); const sb=statusBadge(status); if(sb) chipline.appendChild(sb);
    if(chipline.childNodes.length) s.appendChild(chipline);
    s.appendChild(kvBlock([
      ["model",model],["task",task],
      ["tool calls",pick(evs,["tool_call_count"])],["messages",pick(evs,["message_count"])],
      ["duration",fmtDur(evs)],["summary",pick(evs,["summary"])]
    ]));
    out.appendChild(s);
    const tpath=pick(evs,["agent_transcript_path"]); const conv=pick(evs,["conversation_id","parent_conversation_id"]); const sid=pick(evs,["subagent_id","tool_call_id"]);
    if(tpath&&conv&&sid){
      const ls=section("Archived transcript", null);
      const file=conv+"/"+String(sid).replace(/[^a-zA-Z0-9._-]/g,"_")+".jsonl";
      const a=document.createElement("a"); a.className="d-link"; a.target="_blank"; a.href="/api/transcript?file="+encodeURIComponent(file);
      a.textContent="open subagent transcript ↗"; ls.appendChild(a);
      const note=elp("meta"," (available only after it was archived)"); ls.appendChild(note);
      out.appendChild(ls);
    }
  }
  else {
    const s=section(esc(evs[0]&&evs[0]._event)||"event", cat);
    s.appendChild(kvBlock([
      ["conversation",pick(evs,["conversation_id"])],["session",pick(evs,["session_id"])],
      ["model",pick(evs,["model","model_id"])],["mode",pick(evs,["composer_mode"])],
      ["status",pick(evs,["status"])],["reason",pick(evs,["reason"])],["loop",pick(evs,["loop_count"])],
      ["context %",pick(evs,["context_usage_percent"])],["tokens",pick(evs,["context_tokens"])],
    ]));
    out.appendChild(s);
  }
  return out;
}
function fmtDur(evs){ const d=evs.map(e=>e.duration||e.duration_ms).find(x=>typeof x==="number"); if(typeof d!=="number") return ""; return d>=1000?(d/1000).toFixed(1)+"s":d+"ms"; }

function showDetail(evs, cat){
  const body=$("detailBody");
  body.classList.remove("empty"); body.innerHTML="";
  try { body.appendChild(renderRich(evs, cat)); } catch(e){ body.appendChild(elp("empty","(rich render failed, see hook events below)")); }
  // Hook events written out inline, like every other section (not hidden in a collapsible).
  const hs=section("Hook events ("+evs.length+")", null); hs.classList.add("hooksec");
  evs.slice().sort((a,b)=> new Date(a._ts)-new Date(b._ts)).forEach(ev=>{
    hs.appendChild(elp("ev-sep", ev._event+"  ·  "+srcOf(ev)+"  ·  "+timeOf(ev._ts)));
    hs.appendChild(codeBlock(ev, "hookev"));
  });
  body.appendChild(hs);
  if(gsapOK()) window.gsap.fromTo(body, { opacity:0, y:6 }, { opacity:1, y:0, duration:.22, ease:"power2.out", clearProps:"transform,opacity" });
}

/* ---------------- history view ---------------- */
function groupNodes(evs){
  const m=new Map();
  for(const ev of evs){ const k=keyOf(ev); if(!m.has(k)) m.set(k,{cat:catOf(ev),evs:[],firstTs:ev._ts}); m.get(k).evs.push(ev); }
  return [...m.values()].sort((a,b)=> new Date(a.firstTs)-new Date(b.firstTs));
}
function fmtWhen(ts){ try{ const d=new Date(ts); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+" "+d.toLocaleTimeString("en-GB",{hour12:false,hour:"2-digit",minute:"2-digit"}); }catch{ return ""; } }
function durBetween(a,b){ const ms=Math.max(0,new Date(b)-new Date(a)); if(ms>=3600000) return (ms/3600000).toFixed(1)+"h"; if(ms>=1000) return Math.round(ms/1000)+"s"; return ms+"ms"; }

function historySessions(){
  const map=new Map();
  for(const ev of events){
    if(ev._event==="_ping") continue;
    if(srcFilter.size && !srcFilter.has(srcOf(ev))) continue;
    const key=sessionKeyOf(ev);
    let S=map.get(key);
    if(!S){ S={ key, src:srcOf(ev), model:"", title:"", start:ev._ts, end:ev._ts, prompts:0, tools:0, lastReply:"", lastReplyTs:0, status:"", evs:[] }; map.set(key,S); }
    S.evs.push(ev);
    if(ev.model||ev.model_id) S.model=ev.model||ev.model_id;
    if(ev._ts<S.start) S.start=ev._ts;
    if(ev._ts>S.end) S.end=ev._ts;
    const c=catOf(ev);
    if(c==="prompt"){ S.prompts++; if(!S.title) S.title=clip(ev.prompt,90); }
    if(c==="tool"||c==="shell"||c==="file"||c==="mcp") S.tools++;
    if(c==="response"){ const t=+new Date(ev._ts); if(t>=S.lastReplyTs){ S.lastReplyTs=t; S.lastReply=clip(replyText(ev),150); } }
    if(ev.status) S.status=ev.status;
  }
  let arr=[...map.values()];
  if(search){
    const q=search.toLowerCase();
    arr=arr.filter(S=> (S.key+" "+S.src+" "+S.model+" "+S.title+" "+S.lastReply).toLowerCase().includes(q)
      || S.evs.some(e=>{ const c=catOf(e); if(c==="prompt") return String(e.prompt||"").toLowerCase().includes(q);
        if(c==="response") return String(replyText(e)||"").toLowerCase().includes(q); return false; }));
  }
  return arr;
}

function mkBtn(text, onclick, cls){
  const b=document.createElement("button"); b.className="hbtn"+(cls?" "+cls:""); b.textContent=text;
  b.onclick=(e)=>{ e.stopPropagation(); onclick(); }; return b;
}

function renderHistory(frag){
  const arr=historySessions();
  const pinned=[], normal=[], hiddenArr=[];
  for(const S of arr){ if(hidden.has(S.key)) hiddenArr.push(S); else if(pins.has(S.key)) pinned.push(S); else normal.push(S); }
  const byRecent=(a,b)=> new Date(b.end)-new Date(a.end);
  pinned.sort(byRecent); normal.sort(byRecent); hiddenArr.sort(byRecent);

  const bar=elp("hist-bar");
  bar.appendChild(elp("hist-count",(pinned.length+normal.length)+" sessions"+(hiddenArr.length?(" · "+hiddenArr.length+" hidden"):"")));
  const sp=document.createElement("span"); sp.style.flex="1"; bar.appendChild(sp);
  bar.appendChild(mkBtn("Clear all history", clearAll, "danger"));
  frag.appendChild(bar);

  for(const S of pinned) frag.appendChild(histCard(S));
  for(const S of normal) frag.appendChild(histCard(S));
  if(hiddenArr.length){
    const det=document.createElement("details"); det.className="hist-hidden";
    const sm=document.createElement("summary"); sm.textContent="Hidden ("+hiddenArr.length+")"; det.appendChild(sm);
    for(const S of hiddenArr) det.appendChild(histCard(S));
    frag.appendChild(det);
  }
  return arr.length;
}

function histCard(S){
  const c=elp("hist-card"); c.setAttribute("data-anim-key","hist::"+S.key);
  if(replayKey===S.key) c.classList.add("sel");
  if(pins.has(S.key)) c.classList.add("pinned");

  const head=elp("hist-head");
  head.appendChild(srcBadge(S.src));
  head.appendChild(elp("hist-id", String(S.key).slice(0,8)));
  if(S.model) head.appendChild(elp("hist-model","· "+S.model));
  const sp=document.createElement("span"); sp.style.flex="1"; head.appendChild(sp);
  if(pins.has(S.key)) head.appendChild(elp("hist-pin","★"));
  head.appendChild(elp("hist-when", fmtWhen(S.end)));
  c.appendChild(head);

  c.appendChild(elp("hist-title", S.title || "(no user prompt)"));
  c.appendChild(elp("hist-meta", S.prompts+" turns · "+S.tools+" tools · "+durBetween(S.start,S.end)));
  if(S.lastReply) c.appendChild(elp("hist-reply","↩ "+S.lastReply));

  const acts=elp("hist-acts");
  acts.append(
    mkBtn("Replay", ()=>{ replayKey=S.key; showReplay(S); render(); }),
    mkBtn("JSON", ()=>exportSession(S,"json")),
    mkBtn("Markdown", ()=>exportSession(S,"md")),
    mkBtn(pins.has(S.key)?"Unpin":"Pin", ()=>togglePin(S.key)),
    mkBtn(hidden.has(S.key)?"Unhide":"Hide", ()=>toggleHidden(S.key)),
    mkBtn("Delete", ()=>deleteSession(S.key), "danger")
  );
  c.appendChild(acts);
  c.onclick=()=>{ replayKey=S.key; showReplay(S); render(); };
  return c;
}

function showReplay(S){
  const body=$("detailBody"); body.classList.remove("empty"); body.innerHTML="";
  const head=elp("chipline"); head.appendChild(srcBadge(S.src));
  head.appendChild(elp("meta"," "+String(S.key).slice(0,8)+(S.model?(" · "+S.model):"")));
  body.appendChild(head);
  const evs=S.evs.slice().sort((a,b)=> new Date(a._ts)-new Date(b._ts));
  for(const n of groupNodes(evs)){
    if(n.cat==="lifecycle") continue;   // replay is the conversation, not lifecycle noise
    const blk=elp("replay-turn"); blk.appendChild(renderRich(n.evs, n.cat, {noHead:true})); body.appendChild(blk);
  }
  if(!body.querySelector(".replay-turn")) body.appendChild(elp("empty","(no conversation content captured)"));
  if(gsapOK()) window.gsap.fromTo(body, { opacity:0, y:6 }, { opacity:1, y:0, duration:.22, ease:"power2.out", clearProps:"transform,opacity" });
}

function download(name, text, type){
  const blob=new Blob([text],{type:type||"text/plain"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportSession(S, fmt){
  const evs=S.evs.slice().sort((a,b)=> new Date(a._ts)-new Date(b._ts));
  const base=S.src+"-"+String(S.key).slice(0,8);
  if(fmt==="json"){ download(base+".json", JSON.stringify(evs,null,2), "application/json"); return; }
  let md="# "+S.src+" · session "+String(S.key).slice(0,8)+"\n\n";
  md+="- model: "+(S.model||"?")+"\n- start: "+S.start+"\n- end: "+S.end+"\n- turns: "+S.prompts+" · tools: "+S.tools+"\n\n---\n\n";
  for(const n of groupNodes(evs)){
    const e0=n.evs[0];
    if(n.cat==="prompt") md+="## 🧑 User\n\n"+(pick(n.evs,["prompt"])||"")+"\n\n";
    else if(n.cat==="response") md+="## 🤖 Assistant\n\n"+(pick(n.evs,["text","message","last_assistant_message"])||"")+"\n\n";
    else if(n.cat==="thought") md+="> 💭 "+clip(pick(n.evs,["text","thinking"]),600)+"\n\n";
    else if(n.cat==="shell") md+="`$ "+clip(toolCmd(e0),200)+"`\n\n";
    else if(n.cat==="file") md+="**📄 "+clip(toolPath(e0)||"file",200)+"**\n\n";
    else if(n.cat==="tool"||n.cat==="mcp") md+="**🔧 "+clip(pick(n.evs,["tool_name"])||n.cat,120)+"**\n\n";
  }
  download(base+".md", md, "text/markdown");
}

function togglePin(key){ if(pins.has(key)) pins.delete(key); else pins.add(key); saveSet("am:pins",pins); render(); }
function toggleHidden(key){ if(hidden.has(key)){ hidden.delete(key); } else { hidden.add(key); if(replayKey===key) replayKey=null; } saveSet("am:hidden",hidden); render(); }

async function reloadAll(){
  events=[]; seen=new Set(); animatedKeys.clear(); firstRender=true;
  knownSources.clear(); renderSrcChips();
  const sel=$("session"); sel.innerHTML='<option value="">All sessions</option>'; sessionFilter="";
  try{ const r=await fetch("/api/events"); const arr=await r.json(); arr.forEach(addEvent); }catch(e){}
  render();
}
async function deleteSession(key){
  if(!confirm("Delete this session's events and archived transcript?\n\n"+key+"\n\nThis cannot be undone.")) return;
  try{ const r=await fetch("/api/session/delete?key="+encodeURIComponent(key),{method:"POST"}); if(!r.ok) throw new Error(await r.text()); }
  catch(e){ alert("Delete failed: "+e.message); return; }
  if(replayKey===key) replayKey=null;
  pins.delete(key); saveSet("am:pins",pins); hidden.delete(key); saveSet("am:hidden",hidden);
  await reloadAll();
}
async function clearAll(){
  if(!confirm("Clear ALL history?\n\nThis wipes every captured event and archived transcript for ALL agents and projects. This cannot be undone.")) return;
  if(!confirm("Final confirmation — really wipe everything?")) return;
  try{ const r=await fetch("/api/history/clear",{method:"POST"}); if(!r.ok) throw new Error(await r.text()); }
  catch(e){ alert("Clear failed: "+e.message); return; }
  replayKey=null; pins.clear(); hidden.clear(); saveSet("am:pins",pins); saveSet("am:hidden",hidden);
  await reloadAll();
}

/* ---------------- chips / controls ---------------- */
function ddItem(name, color, on, onToggle){
  const it=elp("dd-item"+(on?" on":""));
  const chk=elp("dd-check"); chk.textContent="✓"; it.appendChild(chk);
  const dot=elp("cdot"); dot.style.background=color; it.appendChild(dot);
  it.appendChild(elp("dd-name", name));
  it.onclick=(e)=>{ e.stopPropagation(); onToggle(); };
  return it;
}
function renderChips(){
  const menu=$("typeMenu"); if(!menu) return; menu.innerHTML="";
  for(const c of CATS){
    menu.appendChild(ddItem(c, cvar(CATVAR[c]), catFilter.has(c), ()=>{
      if(catFilter.has(c)) catFilter.delete(c); else catFilter.add(c); renderChips(); render();
    }));
  }
  menu.appendChild(elp("dd-sep"));
  const acts=elp("dd-actions");
  const bAll=document.createElement("button"); bAll.className="chip-link"; bAll.textContent="select all";
  bAll.onclick=(e)=>{ e.stopPropagation(); CATS.forEach(c=>catFilter.add(c)); renderChips(); render(); };
  const bNone=document.createElement("button"); bNone.className="chip-link"; bNone.textContent="clear";
  bNone.onclick=(e)=>{ e.stopPropagation(); catFilter.clear(); renderChips(); render(); };
  acts.append(bAll,bNone); menu.appendChild(acts);
  const val=$("typeVal"); if(val) val.textContent = catFilter.size>=CATS.length ? "all" : (catFilter.size+"/"+CATS.length);
}
function renderSrcChips(){
  const menu=$("srcMenu"); if(!menu) return; menu.innerHTML="";
  const srcs=[...knownSources].sort();
  const val=$("srcVal");
  if(srcs.length===0){ menu.appendChild(elp("dd-empty","waiting for events…")); if(val) val.textContent="all"; return; }
  for(const s of srcs){
    const on = srcFilter.size===0 || srcFilter.has(s);
    menu.appendChild(ddItem(s, sourceColor(s), on, ()=>{
      if(srcFilter.size===0){ srcs.forEach(x=>srcFilter.add(x)); }   // materialize "all" before toggling one off
      if(srcFilter.has(s)) srcFilter.delete(s); else srcFilter.add(s);
      if(srcFilter.size===srcs.length) srcFilter.clear();            // back to implicit "all"
      renderSrcChips(); render();
    }));
  }
  if(val) val.textContent = srcFilter.size===0 ? "all" : (srcFilter.size+"/"+srcs.length);
}
function setFollow(v){ follow=v; $("followBtn").classList.toggle("on",v); if(v){ const l=$("list"); l.scrollTop=l.scrollHeight; } }
function setFollowUI(v){ follow=v; $("followBtn").classList.toggle("on",v); }
function setConn(live){ const dot=$("dot"), conn=$("conn"); dot.className="dot "+(live?"on":"off"); conn.textContent=live?"live":"connecting"; }

let raf=0;
function scheduleRender(){ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0; render(); }); }

function addEvent(ev){
  if(!ev || ev._event==="_ping") return;
  // Dedupe cross-fired duplicates: the same action captured by two hook
  // registrations is identical except for _source (and a sub-millisecond _ts).
  const { _source, _ts, ...ident } = ev;
  const sig = JSON.stringify(ident);
  if(seen.has(sig)) return; seen.add(sig);
  events.push(ev);
  const src=srcOf(ev);
  if(!knownSources.has(src)){ knownSources.add(src); renderSrcChips(); }
  if(ev.conversation_id || ev.session_id){ const key=sessionKeyOf(ev); const sel=$("session"); if(![...sel.options].some(o=>o.value===key)){ const o=document.createElement("option"); o.value=key; o.textContent=src+" · "+String(key).slice(0,8); sel.appendChild(o); } }
  scheduleRender();
}

const BANNER = "<b>Multi-engine:</b> tag each agent's hooks with a source (cursor / claude / codex / …) and they all stream here. "+
  "<b>Captured:</b> tool calls, shell, file read+edit, MCP, subagent, prompt, thought, response. "+
  "<b>Not captured</b> (platform limit): the full prompt sent to the LLM, per-token reasoning, exact token usage.";

async function boot(){
  renderChips(); renderSrcChips();
  try{ const r=await fetch("/api/events"); const arr=await r.json(); arr.forEach(addEvent); }catch(e){}
  render();
  const list=$("list"); list.scrollTop=list.scrollHeight;
  const es=new EventSource("/stream");
  es.onopen=()=>setConn(true);
  es.onerror=()=>setConn(false);
  es.onmessage=(m)=>{ try{ addEvent(JSON.parse(m.data)); }catch(e){} };
}

function setView(v){
  view=v;
  $("btnTree").classList.toggle("active", v==="tree");
  $("btnTl").classList.toggle("active", v==="timeline");
  $("btnHist").classList.toggle("active", v==="history");
  render(); flashList();
}
$("btnTree").onclick=()=>setView("tree");
$("btnTl").onclick=()=>setView("timeline");
$("btnHist").onclick=()=>setView("history");
$("followBtn").onclick=()=> setFollow(!follow);
$("session").onchange=(e)=>{ sessionFilter=e.target.value; render(); };
$("search").oninput=(e)=>{ search=e.target.value; render(); };
function closeDropdowns(except){ document.querySelectorAll(".dropdown.open").forEach(d=>{ if(d!==except) d.classList.remove("open"); }); }
function wireDropdown(dropId, btnId){
  const drop=$(dropId), btn=$(btnId); if(!drop||!btn) return;
  btn.onclick=(e)=>{ e.stopPropagation(); const open=drop.classList.contains("open"); closeDropdowns(); if(!open) drop.classList.add("open"); };
}
wireDropdown("srcDrop","srcBtn"); wireDropdown("typeDrop","typeBtn");
document.addEventListener("click",(e)=>{ if(!e.target.closest(".dropdown")) closeDropdowns(); });
$("list").addEventListener("scroll",()=>{ const l=$("list"); const near=(l.scrollHeight-l.scrollTop-l.clientHeight)<48; if(near!==follow) setFollowUI(near); });

boot();
</script>
